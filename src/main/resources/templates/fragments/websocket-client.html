<!-- 
  WebSocket STOMP Client Snippet 
  Include this in your Thymeleaf template to receive real-time order status updates.
-->
<script src="https://cdnjs.cloudflare.com/ajax/libs/sockjs-client/1.6.1/sockjs.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/stomp.js/2.3.3/stomp.min.js"></script>

<script th:inline="javascript">
    var stompClient = null;

    function connect() {
        var socket = new SockJS('/ws');
        stompClient = Stomp.over(socket);
        
        stompClient.connect({}, function (frame) {
            console.log('Connected: ' + frame);
            
            // NOTE: Replace {orgId} or {orderId} dynamically.
            // Example: Listen to a specific order updates
            /*
            var orderId = /*[[${order.id}]]*/ 0;
            stompClient.subscribe('/topic/orders/' + orderId, function (message) {
                var payload = JSON.parse(message.body);
                console.log("Order Update:", payload);
                // TODO: Update UI (e.g., status label, timeline)
                alert("Order " + payload.orderCode + " status changed to: " + payload.statusArabic);
            });
            

           // Example: Listen to all orders for an organization
           /*
           var orgId = /*[[${currentOrganization.id}]]*/ 0;
           stompClient.subscribe('/topic/orgs/' + orgId + '/orders', function (message) {
               var payload = JSON.parse(message.body);
               console.log("Org Order Update:", payload);
               // TODO: Update Dashboard or Order Table UI
           });
           
        }, function(error) {
            console.error("STOMP connection error:", error);
            // Reconnect on failure
            setTimeout(connect, 5000);
        });
    }

    // Connect on page load
    document.addEventListener("DOMContentLoaded", function() {
        connect();
    });
</script>
