<!DOCTYPE html>
<html th:lang="${#locale.language}" th:dir="${#locale.language == 'ar' ? 'rtl' : 'ltr'}"
    xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="#{dashboard.courier.history.title} + ' - ' + #{app.title}">سجل الأيام - ShippingGo</title>

    <!-- Early theme apply to prevent flash -->
    <script>
        (function () {
            var theme = localStorage.getItem('theme');
            if (theme === 'dark' || (!theme && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
                document.documentElement.setAttribute('data-theme', 'dark');
            }
        })();
    </script>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;500;600;700&display=swap" rel="stylesheet">

    <link rel="stylesheet" th:href="@{/css/main.css}">
    <link rel="stylesheet" th:href="@{/css/components/sidebar.css}">
    <link rel="stylesheet" th:href="@{/css/components/buttons.css}">
    <link rel="stylesheet" th:href="@{/css/components/forms.css}">
    <link rel="stylesheet" th:href="@{/css/components/tables.css}">
</head>

<body>
    <div class="app-layout">
        <th:block th:replace="~{fragments/sidebar :: sidebar}"></th:block>

        <main class="main-content">
            <!-- Page Header -->
            <div class="page-header">
                <h1 class="page-title">📅 <span th:text="#{dashboard.courier.history.title}">سجل الأيام</span></h1>
                <a th:href="@{/dashboard/courier}" class="btn btn-secondary"
                    th:text="#{dashboard.courier.history.back}">
                    ← العودة لليوم
                </a>
            </div>

            <!-- Days List -->
            <div class="card">
                <div class="card-header">
                    <h3 class="card-title">🗓️ <span th:text="#{dashboard.courier.history.previous_days}">الأيام
                            السابقة</span></h3>
                </div>

                <div th:if="${dayLogs.isEmpty()}" class="table-empty">
                    <div class="table-empty-icon">📭</div>
                    <div class="table-empty-text" th:text="#{dashboard.courier.history.no_logs}">لا توجد سجلات أيام
                        سابقة</div>
                </div>

                <div th:if="${!dayLogs.isEmpty()}" class="table-container" style="border: none;">
                    <table class="table">
                        <thead>
                            <tr>
                                <th th:text="#{dashboard.courier.history.date}">التاريخ</th>
                                <th th:text="#{dashboard.courier.history.total_orders}">إجمالي الطلبات</th>
                                <th th:text="#{dashboard.courier.in_transit}">في الطريق</th>
                                <th th:text="#{dashboard.courier.delivered}">تم التسليم</th>
                                <th th:text="#{dashboard.courier.refused}">مرفوضة</th>
                                <th th:text="#{dashboard.courier.cancelled}">ملغية</th>
                                <th th:text="#{dashboard.courier.actions}">إجراءات</th>
                            </tr>
                        </thead>
                        <tbody>
                            <tr th:each="log : ${dayLogs}">
                                <td th:text="${log.date}">2026-02-06</td>
                                <td>
                                    <span class="badge badge-info" th:text="${log.totalOrders}">0</span>
                                </td>
                                <td>
                                    <span class="badge badge-transit" th:text="${log.inTransitCount}">0</span>
                                </td>
                                <td>
                                    <span class="badge badge-delivered" th:text="${log.deliveredCount}">0</span>
                                </td>
                                <td>
                                    <span class="badge badge-refused" th:text="${log.refusedCount}">0</span>
                                </td>
                                <td>
                                    <span class="badge badge-cancelled" th:text="${log.cancelledCount}">0</span>
                                </td>
                                <td>
                                    <a th:href="@{/dashboard/courier/day/{date}(date=${log.date})}"
                                        class="btn btn-sm btn-primary"
                                        th:text="#{dashboard.courier.history.view_details}">
                                        عرض التفاصيل
                                    </a>
                                </td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </main>
    </div>

    <button class="mobile-menu-toggle" onclick="toggleSidebar()">☰</button>
    <script th:src="@{/js/sidebar.js}"></script>
    <script th:src="@{/js/preferences.js}"></script>
</body>

</html>
