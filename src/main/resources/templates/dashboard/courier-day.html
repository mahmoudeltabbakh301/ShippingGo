<!DOCTYPE html>
<html th:lang="${#locale.language}" th:dir="${#locale.language == 'ar' ? 'rtl' : 'ltr'}"
    xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="#{dashboard.courier.day.title} + ' - ' + #{app.title}">طلبات اليوم - ShippingGo</title>

    <!-- Early theme apply to prevent flash -->
    <script>
        (function () {
            var theme = localStorage.getItem('theme');
            if (theme === 'dark' || (!theme && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
                document.documentElement.setAttribute('data-theme', 'dark');
            }
        })();
    </script>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;500;600;700&display=swap" rel="stylesheet">

    <link rel="stylesheet" th:href="@{/css/main.css}">
    <link rel="stylesheet" th:href="@{/css/components/sidebar.css}">
    <link rel="stylesheet" th:href="@{/css/components/buttons.css}">
    <link rel="stylesheet" th:href="@{/css/components/forms.css}">
    <link rel="stylesheet" th:href="@{/css/components/tables.css}">
</head>

<body>
    <div class="app-layout">
        <th:block th:replace="~{fragments/sidebar :: sidebar}"></th:block>

        <main class="main-content">
            <!-- Page Header -->
            <div class="page-header">
                <h1 class="page-title">📦 <span
                        th:text="#{dashboard.courier.day.orders_of_day} + ' ' + ${selectedDate}">طلبات اليوم</span></h1>
                <a th:href="@{/dashboard/courier/history}" class="btn btn-secondary"
                    th:text="#{dashboard.courier.day.back}">
                    ← العودة للسجل
                </a>
            </div>

            <!-- Day Stats (if dayLog exists) -->
            <div th:if="${dayLog}" class="stats-grid">
                <div class="stat-card">
                    <div class="stat-icon transit">🚚</div>
                    <div class="stat-value" th:text="${dayLog.inTransitCount}">0</div>
                    <div class="stat-label" th:text="#{dashboard.courier.in_transit}">في الطريق</div>
                </div>
                <div class="stat-card">
                    <div class="stat-icon delivered">✅</div>
                    <div class="stat-value" th:text="${dayLog.deliveredCount}">0</div>
                    <div class="stat-label" th:text="#{dashboard.courier.delivered}">تم التسليم</div>
                </div>
                <div class="stat-card">
                    <div class="stat-icon cancelled">❌</div>
                    <div class="stat-value" th:text="${dayLog.cancelledCount}">0</div>
                    <div class="stat-label" th:text="#{dashboard.courier.cancelled}">ملغي</div>
                </div>
                <div class="stat-card">
                    <div class="stat-icon refused">🚫</div>
                    <div class="stat-value" th:text="${dayLog.refusedCount}">0</div>
                    <div class="stat-label" th:text="#{dashboard.courier.refused}">رفض الاستلام</div>
                </div>
            </div>

            <!-- Orders List -->
            <div class="card">
                <div class="card-header">
                    <h3 class="card-title">📋 <span th:text="#{dashboard.courier.day.orders_of_day}">طلبات يوم</span>
                        <span th:text="${selectedDate}">2026-02-06</span>
                    </h3>
                </div>

                <div th:if="${orders.isEmpty()}" class="table-empty">
                    <div class="table-empty-icon">📦</div>
                    <div class="table-empty-text" th:text="#{dashboard.courier.day.no_orders}">لا توجد طلبات في هذا
                        اليوم</div>
                </div>

                <div th:if="${!orders.isEmpty()}" class="table-container" style="border: none;">
                    <table class="table">
                        <thead>
                            <tr>
                                <th th:text="#{dashboard.courier.code}">الكود</th>
                                <th th:text="#{dashboard.courier.client}">العميل</th>
                                <th th:text="#{dashboard.courier.phone}">الهاتف</th>
                                <th th:text="#{dashboard.courier.address}">العنوان</th>
                                <th th:text="#{dashboard.courier.amount}">المبلغ</th>
                                <th th:text="#{dashboard.courier.status}">الحالة</th>
                            </tr>
                        </thead>
                        <tbody>
                            <tr th:each="order : ${orders}">
                                <td th:text="${order.code} ?: '-'">--</td>
                                <td th:text="${order.recipientName}">الاسم</td>
                                <td>
                                    <a th:href="'tel:' + ${order.recipientPhone}" th:text="${order.recipientPhone}"
                                        style="color: var(--primary-400);">الهاتف</a>
                                </td>
                                <td th:text="${order.recipientAddress} ?: '-'"
                                    style="max-width: 200px; overflow: hidden; text-overflow: ellipsis;">العنوان
                                </td>
                                <td
                                    th:text="${order.status.name() == 'PARTIAL_DELIVERY' && order.partialDeliveryAmount != null ? order.partialDeliveryAmount : order.amount} ?: '-'">
                                    المبلغ</td>
                                <td>
                                    <span class="badge"
                                        th:classappend="${order.status.name() == 'WAITING' ? 'badge-waiting' : 
                                                          (order.status.name() == 'IN_TRANSIT' ? 'badge-transit' : 
                                                          (order.status.name() == 'DELIVERED' ? 'badge-delivered' : 
                                                          (order.status.name() == 'CANCELLED' ? 'badge-cancelled' : 'badge-refused')))}"
                                        th:text="${order.status.arabicName}">الحالة</span>
                                </td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </main>
    </div>

    <button class="mobile-menu-toggle" onclick="toggleSidebar()">☰</button>
    <script th:src="@{/js/sidebar.js}"></script>
    <script th:src="@{/js/preferences.js}"></script>
</body>

</html>
