<!DOCTYPE html>
<html th:lang="${#locale.language}" th:dir="${#locale.language == 'ar' ? 'rtl' : 'ltr'}"
    xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="#{dashboard.dataentry.title} + ' - ' + #{app.title}">لوحة التحكم - داتا انتري - ShippingGo</title>

    <!-- Early theme apply to prevent flash -->
    <script>
        (function () {
            var theme = localStorage.getItem('theme');
            if (theme === 'dark' || (!theme && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
                document.documentElement.setAttribute('data-theme', 'dark');
            }
        })();
    </script>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;500;600;700&display=swap" rel="stylesheet">

    <link rel="stylesheet" th:href="@{/css/main.css}">
    <link rel="stylesheet" th:href="@{/css/components/sidebar.css}">
    <link rel="stylesheet" th:href="@{/css/components/buttons.css}">
    <link rel="stylesheet" th:href="@{/css/components/forms.css}">
    <link rel="stylesheet" th:href="@{/css/components/tables.css}">
</head>

<body>
    <div class="app-layout">
        <th:block th:replace="~{fragments/sidebar :: sidebar}"></th:block>

        <main class="main-content">
            <!-- Alerts -->
            <div th:if="${success}" class="alert alert-success"><span>✓</span><span th:text="${success}"></span></div>
            <div th:if="${error}" class="alert alert-danger"><span>✕</span><span th:text="${error}"></span></div>

            <!-- Page Header -->
            <div class="page-header">
                <h1 class="page-title">🏠 <span th:text="#{dashboard.dataentry.title}">لوحة التحكم - موظف إدخال
                        بيانات</span></h1>
                <div class="btn-group">
                    <a th:href="@{/orders/new}" class="btn btn-primary">➕ <span
                            th:text="#{dashboard.dataentry.new_order}">طلب جديد</span></a>
                    <a th:href="@{/orders/import}" class="btn btn-secondary">📥 <span
                            th:text="#{dashboard.dataentry.import_excel}">استيراد Excel</span></a>
                </div>
            </div>

            <!-- Statistics -->
            <div class="stats-grid">
                <div class="stat-card">
                    <div class="stat-icon waiting">⏳</div>
                    <div class="stat-value" th:text="${waitingCount}">0</div>
                    <div class="stat-label" th:text="#{dashboard.dataentry.waiting}">في الانتظار</div>
                </div>
                <div class="stat-card">
                    <div class="stat-icon transit">🚚</div>
                    <div class="stat-value" th:text="${inTransitCount}">0</div>
                    <div class="stat-label" th:text="#{dashboard.dataentry.in_transit}">في الطريق</div>
                </div>
                <div class="stat-card">
                    <div class="stat-icon delivered">✅</div>
                    <div class="stat-value" th:text="${deliveredCount}">0</div>
                    <div class="stat-label" th:text="#{dashboard.dataentry.delivered}">تم التسليم</div>
                </div>
            </div>

            <!-- Recent Orders -->
            <div class="card">
                <div class="card-header">
                    <h3 class="card-title">📋 <span th:text="#{dashboard.dataentry.recent_orders}">آخر الطلبات</span>
                    </h3>
                    <a th:href="@{/orders}" class="btn btn-sm btn-secondary"
                        th:text="#{dashboard.dataentry.view_all}">عرض الكل</a>
                </div>

                <div th:if="${recentOrders.isEmpty()}" class="table-empty">
                    <div class="table-empty-icon">📋</div>
                    <div class="table-empty-text" th:text="#{dashboard.dataentry.no_orders}">لا توجد طلبات بعد</div>
                </div>

                <div th:if="${!recentOrders.isEmpty()}" class="table-container" style="border: none;">
                    <table class="table">
                        <thead>
                            <tr>
                                <th th:text="#{dashboard.dataentry.code}">الكود</th>
                                <th th:text="#{dashboard.dataentry.client}">العميل</th>
                                <th th:text="#{dashboard.dataentry.amount}">المبلغ</th>
                                <th th:text="#{dashboard.dataentry.status}">الحالة</th>
                            </tr>
                        </thead>
                        <tbody>
                            <tr th:each="order : ${recentOrders}">
                                <td th:text="${order.code} ?: '-'">--</td>
                                <td th:text="${order.recipientName}">الاسم</td>
                                <td
                                    th:text="${order.status.name() == 'PARTIAL_DELIVERY' && order.partialDeliveryAmount != null ? order.partialDeliveryAmount : order.amount} ?: '-'">
                                    المبلغ</td>
                                <td>
                                    <span class="badge"
                                        th:classappend="${order.status.name() == 'WAITING' ? 'badge-waiting' : 
                                                          (order.status.name() == 'IN_TRANSIT' ? 'badge-transit' : 
                                                          (order.status.name() == 'DELIVERED' ? 'badge-delivered' : 
                                                          (order.status.name() == 'CANCELLED' ? 'badge-cancelled' : 'badge-refused')))}"
                                        th:text="${order.status.arabicName}">الحالة</span>
                                </td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </main>
    </div>

    <button class="mobile-menu-toggle" onclick="toggleSidebar()">☰</button>
    <script th:src="@{/js/sidebar.js}"></script>
    <script th:src="@{/js/preferences.js}"></script>
</body>

</html>
