<!DOCTYPE html>
<html th:lang="${#locale.language}" th:dir="${#locale.language == 'ar' ? 'rtl' : 'ltr'}"
    xmlns:th="http://www.thymeleaf.org" xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
    layout:decorate="~{layouts/main}">

<head>
    <title th:text="#{network.requests.title} + ' - ' + #{app.title}">طلبات الانضمام</title>
    <!-- Early theme apply to prevent flash -->
    <script>
        (function () {
            var theme = localStorage.getItem('theme');
            if (theme === 'dark' || (!theme && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
                document.documentElement.setAttribute('data-theme', 'dark');
            }
        })();
    </script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;500;600;700&display=swap" rel="stylesheet">

    <link rel="stylesheet" th:href="@{/css/main.css}">
    <link rel="stylesheet" th:href="@{/css/components/sidebar.css}">
    <link rel="stylesheet" th:href="@{/css/components/buttons.css}">
    <link rel="stylesheet" th:href="@{/css/components/tables.css}">
</head>

<body>
    <div class="app-layout">
        <th:block th:replace="~{fragments/sidebar :: sidebar}"></th:block>

        <main class="main-content">
            <div class="page-header">
                <div>
                    <h1 class="page-title">📬 <span th:text="#{network.requests.title}">طلبات الانضمام</span></h1>
                    <p class="text-muted" th:text="#{network.requests.desc}">إدارة طلبات الانضمام المعلقة</p>
                </div>
            </div>

            <div class="grid" style="gap: var(--space-6);">

                <!-- Member Requests -->
                <div class="card">
                    <div class="card-header">
                        <h3 class="card-title" th:text="#{network.requests.member_title}">طلبات الأعضاء</h3>
                    </div>
                    <div th:if="${memberRequests.isEmpty()}" class="table-empty">
                        <div class="table-empty-text" th:text="#{network.requests.empty}">لا توجد طلبات معلقة</div>
                    </div>
                    <div class="table-container" th:if="${!memberRequests.isEmpty()}">
                        <table class="table">
                            <thead>
                                <tr>
                                    <th th:text="#{network.col.name}">الاسم</th>
                                    <th th:text="#{network.col.role}">الدور المطلوب</th>
                                    <th th:text="#{network.col.date}">تاريخ الطلب</th>
                                    <th th:text="#{network.col.actions}">إجراءات</th>
                                </tr>
                            </thead>
                            <tbody>
                                <tr th:each="req : ${memberRequests}">
                                    <td>
                                        <div style="font-weight: 500;" th:text="${req.user.fullName}">الاسم</div>
                                        <small th:text="${req.user.email}">user@example.com</small>
                                    </td>
                                    <td>
                                        <span class="badge badge-info" th:text="${req.assignedRole}">COURIER</span>
                                    </td>
                                    <td th:text="${#temporals.format(req.requestedAt, 'yyyy-MM-dd HH:mm')}"></td>
                                    <td>
                                        <div class="table-actions">
                                            <form th:action="@{/network/requests/member/process}" method="post"
                                                class="d-inline">
                                                <input type="hidden" name="membershipId" th:value="${req.id}">
                                                <input type="hidden" name="accept" value="true">
                                                <button type="submit" class="table-action-btn success"
                                                    th:title="#{network.btn.accept}">✓</button>
                                            </form>
                                            <form th:action="@{/network/requests/member/process}" method="post"
                                                class="d-inline">
                                                <input type="hidden" name="membershipId" th:value="${req.id}">
                                                <input type="hidden" name="accept" value="false">
                                                <button type="submit" class="table-action-btn danger"
                                                    th:title="#{network.btn.reject}">✕</button>
                                            </form>
                                        </div>
                                    </td>
                                </tr>
                            </tbody>
                        </table>
                    </div>
                </div>

                <!-- Organization Link Requests (Only if Company) -->
                <div class="card" th:if="${linkRequests != null}">
                    <div class="card-header">
                        <h3 class="card-title" th:text="#{network.requests.office_title}">طلبات المكاتب</h3>
                    </div>
                    <div th:if="${linkRequests.isEmpty()}" class="table-empty">
                        <div class="table-empty-text" th:text="#{network.requests.office_empty}">لا توجد طلبات مكاتب
                            معلقة</div>
                    </div>
                    <div class="table-container" th:if="${!linkRequests.isEmpty()}">
                        <table class="table">
                            <thead>
                                <tr>
                                    <th th:text="#{network.col.office_name}">اسم المكتب</th>
                                    <th th:text="#{network.col.admin}">الادمن</th>
                                    <th th:text="#{network.col.date}">تاريخ الطلب</th>
                                    <th th:text="#{network.col.actions}">إجراءات</th>
                                </tr>
                            </thead>
                            <tbody>
                                <tr th:each="req : ${linkRequests}">
                                    <td>
                                        <div style="font-weight: 500;" th:text="${req.childOrganization.name}">اسم
                                            المكتب
                                        </div>
                                        <small th:text="${req.childOrganization.address}">العنوان</small>
                                    </td>
                                    <td th:text="${req.childOrganization.admin.fullName}">Admin Name</td>
                                    <td th:text="${#temporals.format(req.requestedAt, 'yyyy-MM-dd HH:mm')}"></td>
                                    <td>
                                        <div class="table-actions">
                                            <form th:action="@{/network/requests/link/process}" method="post"
                                                class="d-inline">
                                                <input type="hidden" name="relationId" th:value="${req.id}">
                                                <input type="hidden" name="accept" value="true">
                                                <button type="submit" class="table-action-btn success"
                                                    th:title="#{network.btn.accept}">✓</button>
                                            </form>
                                            <form th:action="@{/network/requests/link/process}" method="post"
                                                class="d-inline">
                                                <input type="hidden" name="relationId" th:value="${req.id}">
                                                <input type="hidden" name="accept" value="false">
                                                <button type="submit" class="table-action-btn danger"
                                                    th:title="#{network.btn.reject}">✕</button>
                                            </form>
                                        </div>
                                    </td>
                                </tr>
                            </tbody>
                        </table>
                    </div>
                </div>

            </div>
    </div>
</body>

</html>
