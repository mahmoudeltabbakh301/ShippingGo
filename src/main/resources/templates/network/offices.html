<!DOCTYPE html>
<html th:lang="${#locale.language}" th:dir="${#locale.language == 'ar' ? 'rtl' : 'ltr'}"
    xmlns:th="http://www.thymeleaf.org" xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
    layout:decorate="~{layouts/main}" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="#{network.offices.title} + ' - ' + #{app.title}">تصفح المكاتب - ShippingGo</title>
    <!-- Early theme apply to prevent flash -->
    <script>
        (function () {
            var theme = localStorage.getItem('theme');
            if (theme === 'dark' || (!theme && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
                document.documentElement.setAttribute('data-theme', 'dark');
            }
        })();
    </script>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;500;600;700&display=swap" rel="stylesheet">

    <link rel="stylesheet" th:href="@{/css/main.css}">
    <link rel="stylesheet" th:href="@{/css/components/sidebar.css}">
    <link rel="stylesheet" th:href="@{/css/components/buttons.css}">
    <link rel="stylesheet" th:href="@{/css/components/tables.css}">
</head>

<body>
    <div class="app-layout">
        <th:block th:replace="~{fragments/sidebar :: sidebar}"></th:block>

        <main class="main-content">
            <div class="page-header">
                <div>
                    <h1 class="page-title">🏬 <span th:text="#{network.offices.title}">تصفح المكاتب</span></h1>
                    <p class="text-muted" th:text="#{network.offices.desc}">جميع المكاتب المتاحة للانضمام</p>
                </div>
                <div class="page-header-actions">
                    <a th:href="@{/network}" class="btn btn-secondary" th:text="#{network.back_to_network}">← العودة
                        للشبكة</a>
                </div>
            </div>

            <div th:if="${success}" class="alert alert-success">
                <span class="alert-icon">✓</span>
                <span th:text="${success}"></span>
            </div>
            <div th:if="${error}" class="alert alert-danger">
                <span class="alert-icon">✕</span>
                <span th:text="${error}"></span>
            </div>

            <div class="search-container" style="margin-bottom: 2rem;">
                <form action="" method="get" class="d-flex align-items-center" style="display: flex; gap: 10px;">
                    <input type="text" name="query" class="form-input"
                        th:placeholder="#{network.search.placeholder_office}" th:value="${query}"
                        style="flex: 1; padding: 0.75rem;">
                    <button type="submit" class="btn btn-primary" th:text="#{network.search.btn}">بحث</button>
                    <a th:if="${query != null}" th:href="@{/network/offices}" class="btn btn-secondary"
                        th:text="#{network.search.cancel}">إلغاء</a>
                </form>
            </div>

            <div class="card">
                <div th:if="${query == null or query.isEmpty()}" class="table-empty">
                    <div class="table-empty-icon">🔍</div>
                    <div class="table-empty-text">قم بالبحث عن مكتب لعرض النتائج</div>
                </div>
                <div th:if="${query != null and !query.isEmpty() and (allOffices == null or allOffices.isEmpty())}" class="table-empty">
                    <div class="table-empty-icon">🏬</div>
                    <div class="table-empty-text" th:text="#{network.offices.empty_search}">لا توجد مكاتب مطابقة للبحث</div>
                </div>
                <div class="table-container" th:if="${allOffices != null and !allOffices.isEmpty()}">
                    <table class="table">
                        <thead>
                            <tr>
                                <th th:text="#{network.col.office_name}">اسم المكتب</th>
                                <th th:text="#{network.col.address}">العنوان</th>
                                <th th:text="#{network.col.phone}">الهاتف</th>
                                <th th:text="#{network.col.actions}">إجراءات</th>
                            </tr>
                        </thead>
                        <tbody>
                            <tr th:each="office : ${allOffices}">
                                <td>
                                    <div style="font-weight: 500;" th:text="${office.name}">اسم المكتب</div>
                                </td>
                                <td>
                                    <div style="font-size: 0.875rem; color: var(--text-secondary);"
                                        th:text="${office.address ?: '-'}">العنوان</div>
                                </td>
                                <td th:text="${office.phone}">0100000000</td>
                                <td>
                                    <form th:action="@{/network/join-office}" method="post"
                                        sec:authorize="hasRole('ADMIN')">
                                        <input type="hidden" name="officeId" th:value="${office.id}">
                                        <button type="submit" class="btn btn-sm btn-secondary"
                                            th:text="#{network.btn.join}">انضمام</button>
                                    </form>
                                    <span sec:authorize="!hasRole('ADMIN')" class="text-muted"
                                        style="font-size: 0.875rem;" th:text="#{network.admin_only}">المدير فقط</span>
                                </td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </main>
    </div>
    <script th:src="@{/js/preferences.js}"></script>
</body>

</html>
