<!DOCTYPE html>
<html th:lang="${#locale.language}" th:dir="${#locale.language == 'ar' ? 'rtl' : 'ltr'}"
    xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="#{profile.page_title} + ' - ' + #{app.title}">الملف الشخصي - ShippingGo</title>
    <!-- Early theme apply to prevent flash -->
    <script>
        (function () {
            var theme = localStorage.getItem('theme');
            if (theme === 'dark' || (!theme && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
                document.documentElement.setAttribute('data-theme', 'dark');
            }
        })();
    </script>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Cairo:wght@400;500;600;700;800&display=swap"
        rel="stylesheet">

    <link rel="stylesheet" th:href="@{/css/main.css}">
    <link rel="stylesheet" th:href="@{/css/components/sidebar.css}">
    <link rel="stylesheet" th:href="@{/css/components/buttons.css}">
    <link rel="stylesheet" th:href="@{/css/components/forms.css}">
    <link rel="stylesheet" th:href="@{/css/components/tables.css}">
    <!-- Leaflet.js Map -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />

    <style>
        .profile-grid {
            display: grid;
            grid-template-columns: 1fr 2fr;
            gap: 2rem;
        }

        @media (max-width: 768px) {
            .profile-grid {
                grid-template-columns: 1fr;
            }
        }

        .profile-card {
            background: white;
            border-radius: var(--border-radius-lg);
            padding: 2rem;
            box-shadow: var(--shadow-sm);
            border: 1px solid var(--border-color);
            height: fit-content;
        }

        .profile-header {
            text-align: center;
            margin-bottom: 2rem;
        }

        .profile-avatar {
            width: 120px;
            height: 120px;
            border-radius: 50%;
            background-color: var(--bg-secondary);
            margin: 0 auto 1rem;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 3rem;
            font-weight: 700;
            color: var(--text-secondary);
            overflow: hidden;
            border: 4px solid white;
            box-shadow: var(--shadow-md);
        }

        .profile-avatar img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .profile-name {
            font-size: 1.5rem;
            font-weight: 700;
            color: var(--text-primary);
            margin-bottom: 0.25rem;
        }

        .profile-role {
            color: var(--text-secondary);
            font-size: 0.875rem;
            background-color: var(--bg-secondary);
            padding: 0.25rem 0.75rem;
            border-radius: 20px;
            display: inline-block;
        }

        .section-title {
            font-size: 1.125rem;
            font-weight: 600;
            margin-bottom: 1.5rem;
            padding-bottom: 0.75rem;
            border-bottom: 1px solid var(--border-color);
            color: var(--text-primary);
        }
    </style>
</head>

<body>
    <div class="app-layout">
        <th:block th:replace="~{fragments/sidebar :: sidebar}"></th:block>

        <main class="main-content">
            <!-- Alerts -->
            <div th:if="${success}" class="alert alert-success">
                <span>✓</span>
                <span th:text="${success}"></span>
            </div>
            <div th:if="${error}" class="alert alert-danger">
                <span>✕</span>
                <span th:text="${error}"></span>
            </div>

            <!-- Page Header -->
            <div class="page-header">
                <h1 class="page-title">👤 <span th:text="#{profile.title}">الملف الشخصي</span></h1>
            </div>

            <div class="profile-grid">
                <!-- Main Profile Info -->
                <div class="profile-card">
                    <div class="profile-header">
                        <div class="profile-avatar">
                            <img th:if="${user.profilePicture}" th:src="@{'/uploads/' + ${user.profilePicture}}"
                                alt="Profile">
                            <span th:unless="${user.profilePicture}"
                                th:text="${#strings.substring(user.fullName, 0, 1)}">U</span>
                        </div>
                        <h2 class="profile-name" th:text="${user.fullName}">User Name</h2>
                        <span class="profile-role" th:text="${user.role}">Role</span>
                    </div>

                    <form th:action="@{/profile/upload-image}" method="post" enctype="multipart/form-data"
                        style="margin-top: 1.5rem;">
                        <input type="file" name="file" id="file" class="form-control" accept="image/*" required
                            style="display: none;" onchange="this.form.submit()">
                        <button type="button" class="btn btn-outline" style="width: 100%;"
                            onclick="document.getElementById('file').click()">
                            <span th:text="#{profile.btn_change_photo}">📷 تغيير الصورة</span>
                        </button>
                    </form>
                </div>

                <!-- Details & Settings -->
                <div style="display: flex; flex-direction: column; gap: 2rem;">
                    <!-- Personal Info -->
                    <div class="profile-card">
                        <h3 class="section-title" th:text="#{profile.section_personal}">البيانات الشخصية</h3>
                        <form th:action="@{/profile/update}" method="post">
                            <div class="form-grid" style="display: grid; grid-template-columns: 1fr 1fr; gap: 1rem;">
                                <div class="form-group">
                                    <label class="form-label" th:text="#{profile.label_username}">اسم المستخدم</label>
                                    <input type="text" class="form-control" th:value="${user.username}" disabled
                                        style="background-color: var(--bg-secondary);">
                                </div>
                                <div class="form-group">
                                    <label class="form-label" th:text="#{profile.label_email}">البريد الإلكتروني</label>
                                    <input type="email" class="form-control" th:value="${user.email}" disabled
                                        style="background-color: var(--bg-secondary);">
                                </div>
                                <div class="form-group">
                                    <label class="form-label" th:text="#{profile.label_fullname}">الاسم الكامل</label>
                                    <input type="text" name="fullName" class="form-control" th:value="${user.fullName}"
                                        required>
                                </div>
                                <div class="form-group">
                                    <label class="form-label" th:text="#{profile.label_phone}">رقم الهاتف</label>
                                    <input type="text" name="phone" class="form-control" th:value="${user.phone}"
                                        pattern="^01[0125][0-9]{8}$"
                                        title="رقم الهاتف يجب أن يكون رقماً مصرياً صالحاً يبدأ بـ 010 أو 011 أو 012 أو 015 متبوعاً بـ 8 أرقام"
                                        required>
                                </div>
                                <div class="form-group">
                                    <label class="form-label" th:text="#{profile.label_gov}">المحافظة</label>
                                    <select name="governorate" class="form-select" disabled
                                        style="background-color: var(--bg-secondary);">
                                        <option value="" th:text="#{profile.select_gov}">اختر المحافظة</option>
                                        <option th:each="gov : ${governorates}" th:value="${gov}"
                                            th:text="${#locale.language == 'ar' ? gov.arabicName : gov.englishName}"
                                            th:selected="${user.governorate == gov}">
                                        </option>
                                    </select>
                                    <small class="text-muted" th:text="#{profile.hint_gov}">لا يمكن تغيير المحافظة بعد
                                        التسجيل (تواصل مع
                                        الدعم)</small>
                                </div>
                            </div>
                            <div class="form-actions" style="margin-top: 1.5rem; text-align: left;">
                                <button type="submit" class="btn btn-primary" th:text="#{profile.btn_save_personal}">حفظ
                                    التغييرات</button>
                            </div>
                        </form>
                    </div>

                    <!-- Organization Profile (For Admin Only) -->
                    <div class="profile-card" th:if="${organization != null}"
                        sec:authorize="hasAnyRole('ADMIN', 'MANAGER')">
                        <div
                            style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 1.5rem; padding-bottom: 0.75rem; border-bottom: 1px solid var(--border-color);">
                            <h3 class="section-title" style="margin-bottom: 0; border: none; padding: 0;"
                                th:text="#{profile.section_org}">ملف المنظمة
                            </h3>
                            <span class="badge badge-primary" th:text="#{org.type. + ${organization.type}}">Type</span>
                        </div>

                        <form th:action="@{/profile/update-organization}" method="post">
                            <div class="form-group">
                                <label class="form-label" th:text="#{profile.label_about}">نبذة عن المنظمة (تظهر
                                    للآخرين)</label>
                                <textarea name="about" class="form-control" rows="4"
                                    th:placeholder="#{profile.placeholder_about}"
                                    th:text="${organization.about}"></textarea>
                            </div>



                            <div class="form-group" style="margin-top: 1rem;">
                                <label class="form-label" th:text="#{profile.label_org_gov}">محافظة المقر</label>
                                <select name="governorate" class="form-select">
                                    <option value="" th:text="#{profile.select_gov}">اختر المحافظة</option>
                                    <option th:each="gov : ${governorates}" th:value="${gov}"
                                        th:text="${#locale.language == 'ar' ? gov.arabicName : gov.englishName}"
                                        th:selected="${organization.governorate == gov}">
                                    </option>
                                </select>
                            </div>

                            <!-- Map Location Picker -->
                            <div class="form-group" style="margin-top: 1.5rem;">
                                <label class="form-label">📍 موقع المقر على الخريطة</label>
                                <p style="font-size: 0.85rem; color: var(--text-secondary); margin-bottom: 0.75rem;">
                                    اضغط على الخريطة لتحديد موقع المقر، أو استخدم الزر لتحديد موقعك تلقائياً
                                </p>
                                <div style="margin-bottom: 0.75rem; display: flex; gap: 0.5rem; align-items: center; flex-wrap: wrap;">
                                    <button type="button" id="autoLocateBtn" class="btn btn-outline" onclick="autoDetectLocation()" style="display: inline-flex; align-items: center; gap: 6px;">
                                        <span id="locateBtnIcon">📡</span>
                                        <span id="locateBtnText">تحديد الموقع تلقائياً</span>
                                    </button>
                                    <span id="locateStatus" style="font-size: 0.85rem; color: var(--text-secondary); display: none;"></span>
                                </div>
                                <div id="orgMap" style="height: 350px; border-radius: var(--border-radius-md); border: 2px solid var(--border-color); z-index: 0;"></div>
                                <input type="hidden" name="latitude" id="latInput" th:value="${organization.latitude}">
                                <input type="hidden" name="longitude" id="lngInput" th:value="${organization.longitude}">
                                <div id="mapCoords" style="margin-top: 0.5rem; font-size: 0.85rem; color: var(--text-secondary);">
                                    <span th:if="${organization.latitude != null}" th:text="'📌 الإحداثيات: ' + ${organization.latitude} + ', ' + ${organization.longitude}"></span>
                                    <span th:unless="${organization.latitude != null}">لم يتم تحديد الموقع بعد</span>
                                </div>
                            </div>

                            <h4 class="section-title" style="margin-top: 1.5rem; font-size: 1rem;"
                                th:text="#{profile.section_shipping_settings}">إعدادات استلام
                                الشحنات من الأعضاء</h4>
                            <div class="form-check">
                                <input type="checkbox" id="acceptsInternal" name="acceptsInternal"
                                    class="form-check-input" th:checked="${organization.acceptsInternalShipments}">
                                <label class="form-check-label" for="acceptsInternal"
                                    th:text="#{profile.label_internal}">
                                    استلام شحنات داخلية (من نفس المحافظة)
                                </label>
                            </div>
                            <div class="form-check">
                                <input type="checkbox" id="acceptsExternal" name="acceptsExternal"
                                    class="form-check-input" th:checked="${organization.acceptsExternalShipments}">
                                <label class="form-check-label" for="acceptsExternal"
                                    th:text="#{profile.label_external}">
                                    استلام شحنات خارجية (من محافظات أخرى)
                                </label>
                            </div>
                            <div class="form-actions" style="margin-top: 1.5rem; text-align: left;">
                                <button type="submit" class="btn btn-primary" th:text="#{profile.btn_save_org}">حفظ
                                    بيانات
                                    المنظمة</button>
                            </div>
                    </div>


                    </form>
                </div>
            </div>
    </div>
    </main>
    </div>

    <!-- Mobile Menu Toggle -->
    <button class="mobile-menu-toggle" onclick="toggleSidebar()">☰</button>
    <script th:src="@{/js/sidebar.js}"></script>
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script>

        // Initialize map for organization location picker
        (function() {
            var mapEl = document.getElementById('orgMap');
            if (!mapEl) return;

            var latInput = document.getElementById('latInput');
            var lngInput = document.getElementById('lngInput');
            var coordsDiv = document.getElementById('mapCoords');

            var savedLat = latInput.value ? parseFloat(latInput.value) : null;
            var savedLng = lngInput.value ? parseFloat(lngInput.value) : null;

            var defaultLat = savedLat || 30.0444;
            var defaultLng = savedLng || 31.2357;
            var defaultZoom = savedLat ? 15 : 6;

            var map = L.map('orgMap').setView([defaultLat, defaultLng], defaultZoom);

            L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
                attribution: '© OpenStreetMap',
                maxZoom: 19
            }).addTo(map);

            var marker = null;

            if (savedLat && savedLng) {
                marker = L.marker([savedLat, savedLng]).addTo(map)
                    .bindPopup('📍 موقع المقر الحالي').openPopup();
            }

            function setMapLocation(lat, lng) {
                if (marker) {
                    marker.setLatLng([lat, lng]);
                } else {
                    marker = L.marker([lat, lng]).addTo(map);
                }
                marker.bindPopup('📍 الموقع المحدد: ' + lat.toFixed(6) + ', ' + lng.toFixed(6)).openPopup();
                latInput.value = lat;
                lngInput.value = lng;
                coordsDiv.innerHTML = '📌 الإحداثيات: ' + lat.toFixed(6) + ', ' + lng.toFixed(6);
            }

            map.on('click', function(e) {
                setMapLocation(e.latlng.lat, e.latlng.lng);
            });

            // Auto-detect location function
            window.autoDetectLocation = function() {
                var btn = document.getElementById('autoLocateBtn');
                var btnIcon = document.getElementById('locateBtnIcon');
                var btnText = document.getElementById('locateBtnText');
                var status = document.getElementById('locateStatus');

                if (!navigator.geolocation) {
                    status.textContent = '❌ المتصفح لا يدعم تحديد الموقع';
                    status.style.color = 'var(--danger-color, #e74c3c)';
                    status.style.display = 'inline';
                    return;
                }

                btn.disabled = true;
                btnIcon.textContent = '⏳';
                btnText.textContent = 'جاري تحديد الموقع...';
                status.style.display = 'none';

                navigator.geolocation.getCurrentPosition(
                    function(position) {
                        var lat = position.coords.latitude;
                        var lng = position.coords.longitude;

                        setMapLocation(lat, lng);
                        map.setView([lat, lng], 16);

                        btn.disabled = false;
                        btnIcon.textContent = '✅';
                        btnText.textContent = 'تم تحديد الموقع';
                        status.textContent = '📍 تم تحديد موقعك بدقة ' + position.coords.accuracy.toFixed(0) + ' متر';
                        status.style.color = 'var(--success-color, #27ae60)';
                        status.style.display = 'inline';

                        setTimeout(function() {
                            btnIcon.textContent = '📡';
                            btnText.textContent = 'تحديد الموقع تلقائياً';
                        }, 3000);
                    },
                    function(error) {
                        btn.disabled = false;
                        btnIcon.textContent = '📡';
                        btnText.textContent = 'تحديد الموقع تلقائياً';

                        var msg = '❌ ';
                        switch (error.code) {
                            case error.PERMISSION_DENIED: msg += 'تم رفض صلاحية الموقع. يرجى السماح من إعدادات المتصفح.'; break;
                            case error.POSITION_UNAVAILABLE: msg += 'الموقع غير متاح حالياً.'; break;
                            case error.TIMEOUT: msg += 'انتهت مهلة تحديد الموقع. حاول مرة أخرى.'; break;
                            default: msg += 'حدث خطأ غير متوقع.'; break;
                        }
                        status.textContent = msg;
                        status.style.color = 'var(--danger-color, #e74c3c)';
                        status.style.display = 'inline';
                    },
                    { enableHighAccuracy: true, timeout: 10000, maximumAge: 0 }
                );
            };
        })();
    </script>
</body>

</html>
