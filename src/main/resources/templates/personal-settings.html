<!DOCTYPE html>
<html th:lang="${#locale.language}" th:dir="${#locale.language == 'ar' ? 'rtl' : 'ltr'}"
    xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="#{settings.personal_page_title} + ' - ' + #{app.title}">الإعدادات الشخصية - ShippingGo</title>
    <!-- Early theme apply to prevent flash -->
    <script>
        (function () {
            var theme = localStorage.getItem('theme');
            if (theme === 'dark' || (!theme && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
                document.documentElement.setAttribute('data-theme', 'dark');
            }
        })();
    </script>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Cairo:wght@400;500;600;700;800&display=swap"
        rel="stylesheet">

    <link rel="stylesheet" th:href="@{/css/main.css}">
    <link rel="stylesheet" th:href="@{/css/components/sidebar.css}">
    <link rel="stylesheet" th:href="@{/css/components/buttons.css}">
    <link rel="stylesheet" th:href="@{/css/components/forms.css}">

    <style>
        .settings-container {
            max-width: 600px;
            margin: 0 auto;
            display: flex;
            flex-direction: column;
            gap: 1.5rem;
        }

        .settings-card {
            background: white;
            border-radius: var(--border-radius-lg);
            padding: 2rem;
            box-shadow: var(--shadow-sm);
            border: 1px solid var(--border-color);
        }

        .settings-title {
            font-size: 1.25rem;
            font-weight: 700;
            margin-bottom: 1.5rem;
            color: var(--text-primary);
            display: flex;
            align-items: center;
            gap: 0.75rem;
        }

        .settings-icon {
            font-size: 1.5rem;
        }
    </style>
</head>

<body>
    <div class="app-layout">
        <th:block th:replace="~{fragments/sidebar :: sidebar}"></th:block>

        <main class="main-content">
            <!-- Alerts -->
            <div th:if="${success}" class="alert alert-success">
                <span>✓</span>
                <span th:text="${success}"></span>
            </div>
            <div th:if="${error}" class="alert alert-danger">
                <span>✕</span>
                <span th:text="${error}"></span>
            </div>

            <!-- Page Header -->
            <div class="page-header" style="display: flex; align-items: center; gap: 1rem;">
                <a th:href="@{/settings}" class="btn btn-outline"
                    style="padding: 0.5rem 1rem; border: none; background: transparent; font-size: 1.2rem; text-decoration: none;"
                    th:title="#{nav.go_back:رجوع}">
                    <span th:if="${#locale.language == 'ar'}">←</span>
                    <span th:unless="${#locale.language == 'ar'}">→</span>
                </a>
                <h1 class="page-title" style="margin: 0;">⚙️ <span th:text="#{settings.section_personal}">الإعدادات
                        الشخصية</span></h1>
            </div>

            <div class="settings-container">
                <!-- Change Password -->
                <div class="settings-card">
                    <div class="settings-title">
                        <span class="settings-icon">🔒</span>
                        <span th:text="#{settings.section_password}">تغيير كلمة المرور</span>
                    </div>
                    <form th:action="@{/settings/update-password}" method="post">
                        <div class="form-group">
                            <label class="form-label" th:text="#{settings.label_current_pwd}">كلمة المرور
                                الحالية</label>
                            <input type="password" name="currentPassword" class="form-control" required>
                        </div>
                        <div class="form-group">
                            <label class="form-label" th:text="#{settings.label_new_pwd}">كلمة المرور الجديدة</label>
                            <input type="password" name="newPassword" class="form-control" required minlength="6">
                        </div>
                        <div class="form-group">
                            <label class="form-label" th:text="#{settings.label_confirm_pwd}">تأكيد كلمة المرور
                                الجديدة</label>
                            <input type="password" name="confirmPassword" class="form-control" required minlength="6">
                        </div>
                        <button type="submit" class="btn btn-primary" style="width: 100%;"
                            th:text="#{settings.btn_save}">حفظ التغييرات</button>
                    </form>
                </div>

                <!-- Organization Settings (Admin Only) -->
                <div class="settings-card" th:if="${organization != null}"
                    sec:authorize="hasAnyRole('ADMIN', 'MANAGER')">
                    <div class="settings-title">
                        <span class="settings-icon">🏢</span>
                        <span th:text="#{settings.section_org}">إعدادات المنظمة</span>
                    </div>
                    <form th:action="@{/settings/update-organization}" method="post">
                        <div class="form-group">
                            <label class="form-label" th:text="#{settings.label_org_name}">اسم المنظمة</label>
                            <input type="text" name="name" class="form-control" th:value="${organization.name}"
                                required>
                        </div>
                        <div class="form-group">
                            <label class="form-label" th:text="#{settings.label_org_address}">العنوان</label>
                            <input type="text" name="address" class="form-control" th:value="${organization.address}">
                        </div>
                        <div class="form-group">
                            <label class="form-label" th:text="#{settings.label_org_phone}">رقم الهاتف</label>
                            <input type="text" name="phone" class="form-control" th:value="${organization.phone}">
                        </div>
                        <div class="form-group">
                            <label class="form-label" th:text="#{settings.label_org_email}">البريد الإلكتروني</label>
                            <input type="email" name="email" class="form-control" th:value="${organization.email}">
                        </div>
                        <div class="form-group">
                            <label class="form-label" th:text="#{settings.label_org_about}">نبذة عن المنظمة</label>
                            <textarea name="about" class="form-control" rows="4"
                                th:text="${organization.about}"></textarea>
                        </div>
                        <button type="submit" class="btn btn-primary" style="width: 100%;"
                            th:text="#{settings.btn_save_org}">حفظ التغييرات</button>
                    </form>
                </div>
            </div>
        </main>
    </div>

    <!-- Mobile Menu Toggle -->
    <button class="mobile-menu-toggle" onclick="toggleSidebar()">☰</button>
    <script>
        function toggleSidebar() {
            document.querySelector('.sidebar').classList.toggle('open');
        }
    </script>
</body>

</html>
