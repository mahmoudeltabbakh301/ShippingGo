<!DOCTYPE html>
<html th:lang="${#locale.language}" th:dir="${#locale.language == 'ar' ? 'rtl' : 'ltr'}"
    xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="#{auth.forgot_password.title} + ' - ' + #{app.title}">نسيت كلمة المرور - ShippingGo</title>

    <script>
        (function () {
            var theme = localStorage.getItem('theme');
            if (theme === 'dark' || (!theme && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
                document.documentElement.setAttribute('data-theme', 'dark');
            }
        })();
    </script>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;500;600;700&display=swap" rel="stylesheet">

    <link rel="stylesheet" th:href="@{/css/main.css}">
    <link rel="stylesheet" th:href="@{/css/components/buttons.css}">
    <link rel="stylesheet" th:href="@{/css/components/forms.css}">
    <link rel="stylesheet" th:href="@{/css/pages/auth.css}">
</head>

<body>
    <div class="auth-page">
        <div class="auth-container">
            <div class="auth-card">
                <div class="auth-logo">
                    <img th:src="@{/img/logo.jpg}" class="auth-logo-img" alt="Logo">
                    <div class="auth-subtitle" th:text="#{auth.subtitle}">نظام إدارة شحن الطرود</div>
                </div>

                <h1 class="auth-title" th:text="#{auth.forgot_password.title}">نسيت كلمة المرور</h1>
                <p style="text-align: center; color: var(--text-secondary); margin-bottom: var(--space-6);" th:text="#{auth.forgot_password.desc}">
                    أدخل اسم المستخدم والبريد الإلكتروني المرهم بالحساب، وسنرسل لك رمزاً لإعادة تعيين كلمة المرور.
                </p>

                <div th:if="${error}" class="alert alert-danger" th:text="${error}"></div>
                <div th:if="${success}" class="alert alert-success" th:text="${success}"></div>

                <form th:action="@{/forgot-password}" method="post" class="auth-form">
                    <div class="form-group">
                        <label class="form-label" for="username" th:text="#{auth.username.label}">اسم المستخدم (كود المندوب أو الشركة)</label>
                        <input type="text" id="username" name="username" class="form-control"
                            th:placeholder="#{auth.username.placeholder}" required autofocus>
                    </div>

                    <div class="form-group">
                        <label class="form-label" for="email" th:text="#{auth.email.label}">البريد الإلكتروني</label>
                        <input type="email" id="email" name="email" class="form-control"
                            th:placeholder="#{auth.email.placeholder}" required>
                    </div>

                    <button type="submit" class="btn btn-primary btn-lg" style="width: 100%;"
                        th:text="#{auth.forgot_password.btn}">
                        إرسال كود استعادة
                    </button>
                </form>

                <div class="auth-footer">
                    <span th:text="#{auth.forgot_password.back_prompt}">تذكرت كلمة المرور؟</span>
                    <a th:href="@{/login}" th:text="#{auth.login.link}">تسجيل الدخول</a>
                </div>
            </div>
        </div>
    </div>
    <script th:src="@{/js/preferences.js}"></script>
</body>
</html>
