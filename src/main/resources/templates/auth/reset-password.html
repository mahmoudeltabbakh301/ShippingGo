<!DOCTYPE html>
<html th:lang="${#locale.language}" th:dir="${#locale.language == 'ar' ? 'rtl' : 'ltr'}"
    xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="#{auth.reset_password.title} + ' - ' + #{app.title}">إعادة تعيين كلمة المرور - ShippingGo</title>

    <script>
        (function () {
            var theme = localStorage.getItem('theme');
            if (theme === 'dark' || (!theme && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
                document.documentElement.setAttribute('data-theme', 'dark');
            }
        })();
    </script>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;500;600;700&display=swap" rel="stylesheet">

    <link rel="stylesheet" th:href="@{/css/main.css}">
    <link rel="stylesheet" th:href="@{/css/components/buttons.css}">
    <link rel="stylesheet" th:href="@{/css/components/forms.css}">
    <link rel="stylesheet" th:href="@{/css/pages/auth.css}">
</head>

<body>
    <div class="auth-page">
        <div class="auth-container">
            <div class="auth-card">
                <div class="auth-logo">
                    <img th:src="@{/img/logo.jpg}" class="auth-logo-img" alt="Logo">
                    <div class="auth-subtitle" th:text="#{auth.subtitle}">نظام إدارة شحن الطرود</div>
                </div>

                <h1 class="auth-title" th:text="#{auth.reset_password.title}">إعادة تعيين كلمة المرور</h1>

                <div th:if="${error}" class="alert alert-danger" th:text="${error}"></div>
                <div th:if="${success}" class="alert alert-success" th:text="${success}"></div>

                <form th:action="@{/reset-password}" method="post" class="auth-form">
                    <input type="hidden" name="username" th:value="${username}">
                    
                    <div class="form-group">
                        <label class="form-label" for="code" th:text="#{auth.reset_password.code_label}">الكود السري</label>
                        <input type="text" id="code" name="code" class="form-control"
                            th:placeholder="#{auth.reset_password.code_placeholder}" required autofocus maxlength="6" pattern="\d{6}">
                    </div>

                    <div class="form-group">
                        <label class="form-label" for="newPassword" th:text="#{auth.reset_password.new_password_label}">كلمة المرور الجديدة</label>
                        <input type="password" id="newPassword" name="newPassword" class="form-control"
                            th:placeholder="#{auth.reset_password.new_password_placeholder}" required>
                    </div>

                    <button type="submit" class="btn btn-primary btn-lg" style="width: 100%;"
                        th:text="#{auth.reset_password.btn}">
                        إعادة تعيين
                    </button>
                </form>

                <div class="auth-footer">
                    <span th:text="#{auth.forgot_password.back_prompt}">تذكرت كلمة المرور؟</span>
                    <a th:href="@{/login}" th:text="#{auth.login.link}">تسجيل الدخول</a>
                </div>
            </div>
        </div>
    </div>
    <script th:src="@{/js/preferences.js}"></script>
</body>
</html>
