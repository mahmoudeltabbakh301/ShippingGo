<!DOCTYPE html>
<html th:lang="${#locale.language}" th:dir="${#locale.language == 'ar' ? 'rtl' : 'ltr'}"
    xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">
    <title th:text="#{auth.login.title} + ' - ' + #{app.title}">تسجيل الدخول - ShippingGo</title>

    <!-- Early theme apply to prevent flash -->
    <script>
        (function () {
            var theme = localStorage.getItem('theme');
            if (theme === 'dark' || (!theme && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
                document.documentElement.setAttribute('data-theme', 'dark');
            }
        })();
    </script>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;500;600;700&display=swap" rel="stylesheet">

    <link rel="stylesheet" th:href="@{/css/main.css}">
    <link rel="stylesheet" th:href="@{/css/components/buttons.css}">
    <link rel="stylesheet" th:href="@{/css/components/forms.css}">
    <link rel="stylesheet" th:href="@{/css/pages/auth.css}">
</head>

<body>
    <div class="auth-page">
        <div class="auth-container">
            <div class="auth-card">
                <!-- Logo -->
                <div class="auth-logo">
                    <img th:src="@{/img/logo.jpg}" class="auth-logo-img">
                    <div class="auth-subtitle" th:text="#{auth.subtitle}">نظام إدارة شحن الطرود</div>
                </div>

                <h1 class="auth-title" th:text="#{auth.login.title}">تسجيل الدخول</h1>

                <!-- Alerts -->
                <div th:if="${param.error}" class="alert alert-danger" th:text="#{auth.login.error}">
                    اسم المستخدم أو كلمة المرور غير صحيحة
                </div>
                <div th:if="${param.logout}" class="alert alert-success" th:text="#{auth.logout.success}">
                    تم تسجيل الخروج بنجاح
                </div>
                <div th:if="${success}" class="alert alert-success" th:text="${success}"></div>

                <!-- Login Form -->
                <form th:action="@{/login}" method="post" class="auth-form">
                    <div class="form-group">
                        <label class="form-label" for="username" th:text="#{auth.username.label}">اسم المستخدم</label>
                        <input type="text" id="username" name="username" class="form-control"
                            th:placeholder="#{auth.username.placeholder}" required autofocus>
                    </div>

                    <div class="form-group">
                        <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: var(--space-2);">
                            <label class="form-label" for="password" th:text="#{auth.password.label}" style="margin-bottom: 0;">كلمة المرور</label>
                            <a th:href="@{/forgot-password}" style="font-size: 0.85rem;" th:text="#{auth.forgot_password.link}">نسيت كلمة المرور؟</a>
                        </div>
                        <input type="password" id="password" name="password" class="form-control"
                            th:placeholder="#{auth.password.placeholder}" required>
                    </div>

                    <button type="submit" class="btn btn-primary btn-lg" style="width: 100%;"
                        th:text="#{auth.login.btn}">
                        دخول
                    </button>
                </form>

                <div class="auth-footer">
                    <span th:text="#{auth.register.prompt}">ليس لديك حساب؟</span>
                    <a th:href="@{/register}" th:text="#{auth.register.link}">إنشاء حساب جديد</a>

                    <div
                        style="margin-top: var(--space-4); display: flex; justify-content: center; gap: var(--space-4);">
                        <a th:href="${#locale.language == 'ar' ? '?lang=en' : '?lang=ar'}"
                            th:text="${#locale.language == 'ar' ? 'English' : 'العربية'}">EN</a>
                    </div>
                </div>
            </div>
        </div>
    </div>
    <script th:src="@{/js/preferences.js}"></script>
</body>

</html>
