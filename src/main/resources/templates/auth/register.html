<!DOCTYPE html>
<html th:lang="${#locale.language}" th:dir="${#locale.language == 'ar' ? 'rtl' : 'ltr'}"
    xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="#{auth.register.title} + ' - ' + #{app.title}">إنشاء حساب جديد - ShippingGo</title>

    <!-- Early theme apply to prevent flash -->
    <script>
        (function () {
            var theme = localStorage.getItem('theme');
            if (theme === 'dark' || (!theme && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
                document.documentElement.setAttribute('data-theme', 'dark');
            }
        })();
    </script>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;500;600;700&display=swap" rel="stylesheet">

    <link rel="stylesheet" th:href="@{/css/main.css}">
    <link rel="stylesheet" th:href="@{/css/components/buttons.css}">
    <link rel="stylesheet" th:href="@{/css/components/forms.css}">
    <link rel="stylesheet" th:href="@{/css/pages/auth.css}">
</head>

<body>
    <div class="auth-page">
        <div class="auth-container" style="max-width: 550px;">
            <div class="auth-card">
                <!-- Logo -->
                <div class="auth-logo">
                    <img th:src="@{/img/logo.jpg}" alt="ShippingGo Logo" class="auth-logo-img">
                    <div class="auth-subtitle" th:text="#{auth.subtitle}">نظام إدارة شحن الطرود</div>
                </div>

                <h1 class="auth-title" th:text="#{auth.register.title}">إنشاء حساب جديد</h1>

                <!-- Alert -->
                <div th:if="${error}" class="alert alert-danger" th:text="${error}"></div>

                <!-- Register Form -->
                <form th:action="@{/register}" th:object="${registrationDto}" method="post" class="auth-form"
                    enctype="multipart/form-data">



                    <!-- Basic Info -->
                    <div class="form-row">
                        <div class="form-group">
                            <label class="form-label form-label-required" for="fullName"
                                th:text="#{auth.fullname.label}">الاسم الرباعي</label>
                            <input type="text" id="fullName" th:field="*{fullName}" class="form-control"
                                th:classappend="${#fields.hasErrors('fullName')} ? 'is-invalid' : ''"
                                th:placeholder="#{auth.fullname.placeholder}" required autofocus>
                        </div>
                        <div class="form-group">
                            <label class="form-label form-label-required" for="username" th:text="#{auth.username.label}">اسم المستخدم</label>
                            <input type="text" id="username" th:field="*{username}" class="form-control"
                                th:placeholder="#{auth.username.placeholder}" required>
                        </div>
                    </div>

                    <div class="form-row">
                        <div class="form-group">
                            <label class="form-label form-label-required" for="email" th:text="#{auth.email.label}">البريد الإلكتروني</label>
                            <input type="email" id="email" th:field="*{email}" class="form-control"
                                th:placeholder="#{auth.email.placeholder}" required>
                        </div>
                        <div class="form-group">
                            <label class="form-label form-label-required" for="phone" th:text="#{auth.phone.label}">رقم
                                الهاتف</label>
                            <input type="tel" id="phone" th:field="*{phone}" class="form-control"
                                th:classappend="${#fields.hasErrors('phone')} ? 'is-invalid' : ''"
                                th:placeholder="#{auth.phone.placeholder}" pattern="^01[0125][0-9]{8}$"
                                th:title="#{auth.phone.title}" required>
                            <div th:if="${#fields.hasErrors('phone')}" class="invalid-feedback" th:errors="*{phone}">
                            </div>
                        </div>
                    </div>

                    <div class="form-group">
                        <label class="form-label form-label-required" for="governorate" th:text="#{auth.governorate.label}">المحافظة</label>
                        <select id="governorate" th:field="*{governorate}" class="form-control" required>
                            <option value="" th:text="#{auth.governorate.placeholder}">اختر المحافظة</option>
                            <option th:each="gov : ${governorates}" th:value="${gov}" th:text="|#{'enum.governorate.' + ${gov.name()}}|">
                            </option>
                        </select>
                    </div>

                    <div class="form-group">
                        <label class="form-label form-label-required" for="password"
                            th:text="#{auth.password.label}">كلمة المرور</label>
                        <input type="password" id="password" th:field="*{password}" class="form-control"
                            th:classappend="${#fields.hasErrors('password')} ? 'is-invalid' : ''"
                            th:placeholder="#{auth.password.placeholder}" required>
                    </div>

                    <!-- Organization Option -->
                    <div class="form-group">
                        <div class="form-check">
                            <input type="checkbox" id="createOrganization" th:field="*{createOrganization}"
                                class="form-check-input" onchange="toggleOrganizationOptions()">
                            <label class="form-check-label" for="createOrganization" th:text="#{auth.org.create.label}">
                                أريد إنشاء منظمة (شركة، متجر، أو مكتب)
                            </label>
                        </div>
                    </div>

                    <!-- Organization Details -->
                    <div id="organizationOptions" class="organization-options hidden">
                        <div class="organization-type-grid" style="grid-template-columns: repeat(3, 1fr);">
                            <div class="type-option">
                                <input type="radio" id="typeStore" name="organizationType" value="STORE"
                                    th:field="*{organizationType}">
                                <label class="type-option-label" for="typeStore">
                                    <div class="type-option-icon">🏪</div>
                                    <div class="type-option-title" th:text="#{auth.org.type.store}">متجر</div>
                                </label>
                            </div>
                            <div class="type-option">
                                <input type="radio" id="typeCompany" name="organizationType" value="COMPANY"
                                    th:field="*{organizationType}">
                                <label class="type-option-label" for="typeCompany">
                                    <div class="type-option-icon">🏢</div>
                                    <div class="type-option-title" th:text="#{auth.org.type.company}">شركة شحن</div>
                                </label>
                            </div>
                            <div class="type-option">
                                <input type="radio" id="typeOffice" name="organizationType" value="OFFICE"
                                    th:field="*{organizationType}">
                                <label class="type-option-label" for="typeOffice">
                                    <div class="type-option-icon">🏬</div>
                                    <div class="type-option-title" th:text="#{auth.org.type.office}">مكتب شحن</div>
                                </label>
                            </div>
                        </div>

                        <div class="form-group">
                            <label class="form-label form-label-required" for="organizationName" th:text="#{auth.org.name.label}">اسم
                                الشركة/المكتب</label>
                            <input type="text" id="organizationName" th:field="*{organizationName}" class="form-control"
                                th:placeholder="#{auth.org.name.placeholder}">
                        </div>

                        <div class="form-row">
                            <div class="form-group">
                                <label class="form-label" for="organizationPhone" th:text="#{auth.org.phone.label}">هاتف الشركة/المكتب</label>
                                <input type="tel" id="organizationPhone" th:field="*{organizationPhone}"
                                    class="form-control" th:placeholder="#{auth.org.phone.placeholder}" pattern="^01[0125][0-9]{8}$"
                                    th:title="#{auth.org.phone.title}">
                                <div th:if="${#fields.hasErrors('organizationPhone')}" class="invalid-feedback"
                                    th:errors="*{organizationPhone}"></div>
                            </div>
                            <div class="form-group">
                                <label class="form-label" for="organizationEmail" th:text="#{auth.org.email.label}">البريد الإلكتروني</label>
                                <input type="email" id="organizationEmail" th:field="*{organizationEmail}"
                                    class="form-control" th:placeholder="#{auth.org.email.placeholder}">
                            </div>
                        </div>

                        <div class="form-group">
                            <input type="text" id="organizationAddress" th:field="*{organizationAddress}"
                                class="form-control" th:placeholder="#{auth.org.address.placeholder}">
                        </div>

                        <div class="form-group">
                            <label class="form-label form-label-required" for="organizationGovernorate" th:text="#{auth.org.gov.label}">محافظة
                                المقر</label>
                            <select id="organizationGovernorate" th:field="*{organizationGovernorate}"
                                class="form-control">
                                <option value="" th:text="#{auth.org.gov.placeholder}">اختر المحافظة</option>
                                <option th:each="gov : ${governorates}" th:value="${gov}" th:text="|#{'enum.governorate.' + ${gov.name()}}|">
                                </option>
                            </select>
                        </div>
                    </div>

                    <button type="submit" class="btn btn-primary btn-lg"
                        style="width: 100%; margin-top: var(--space-4);" th:text="#{auth.register.btn}">
                        إنشاء الحساب
                    </button>
                </form>

                <div class="auth-footer">
                    <span th:text="#{auth.login.prompt}">لديك حساب بالفعل؟</span>
                    <a th:href="@{/login}" th:text="#{auth.login.link}">تسجيل الدخول</a>

                    <div
                        style="margin-top: var(--space-4); display: flex; justify-content: center; gap: var(--space-4);">
                        <a th:href="${#locale.language == 'ar' ? '?lang=en' : '?lang=ar'}"
                            th:text="${#locale.language == 'ar' ? 'English' : 'العربية'}">EN</a>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        function toggleOrganizationOptions() {
            const checkbox = document.getElementById('createOrganization');
            const options = document.getElementById('organizationOptions');
            if (options) options.classList.toggle('hidden', !checkbox.checked);
        }

        // Initialize state on load
        window.addEventListener('DOMContentLoaded', function () {
            toggleOrganizationOptions();
        });
    </script>
</body>

</html>
