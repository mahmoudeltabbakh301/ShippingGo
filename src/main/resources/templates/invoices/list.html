<!DOCTYPE html>
<html th:lang="${#locale.language}" th:dir="${#locale.language == 'ar' ? 'rtl' : 'ltr'}"
    xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>الفواتير - ShippingGo</title>
    
    <script>
        (function () {
            var theme = localStorage.getItem('theme');
            if (theme === 'dark' || (!theme && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
                document.documentElement.setAttribute('data-theme', 'dark');
            }
        })();
    </script>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;500;600;700&display=swap" rel="stylesheet">

    <link rel="stylesheet" th:href="@{/css/main.css}">
    <link rel="stylesheet" th:href="@{/css/components/sidebar.css}">
    <link rel="stylesheet" th:href="@{/css/components/buttons.css}">
    <link rel="stylesheet" th:href="@{/css/components/tables.css}">
    <link rel="stylesheet" th:href="@{/css/components/cards.css}">
</head>

<body>
    <div class="app-layout">
        <th:block th:replace="~{fragments/sidebar :: sidebar}"></th:block>

        <main class="main-content">
            <div class="page-header">
                <h1 class="page-title">📄 <span th:text="#{invoices.list.title}">إدارة الفواتير</span></h1>
            </div>

            <div th:if="${success}" class="alert alert-success" th:text="${success}"></div>
            <div th:if="${error}" class="alert alert-danger" th:text="${error}"></div>

            <div class="card" style="margin-bottom: var(--space-6);">
                <div class="card-header" style="justify-content: space-between;">
                    <h3 class="card-title" th:text="#{invoices.list.title}">قائمة الفواتير</h3>
                    
                    <form th:action="@{/invoices/generate}" method="post" style="margin: 0;">
                        <button type="submit" class="btn btn-primary" th:onclick="return confirm([[#{invoices.list.confirm_generate}]]);">
                            <span th:text="#{invoices.list.btn_generate}">➕ إنشاء فاتورة جديدة</span>
                        </button>
                    </form>
                </div>
                
                <div class="table-container">
                    <table class="data-table">
                        <thead>
                            <tr>
                                <th th:text="#{invoices.list.col_number}">رقم الفاتورة</th>
                                <th th:text="#{invoices.list.col_date}">التاريخ</th>
                                <th th:text="#{invoices.list.col_amount}">القيمة</th>
                                <th th:text="#{invoices.list.col_status}">الحالة</th>
                                <th th:text="#{invoices.list.col_actions}">إجراءات</th>
                            </tr>
                        </thead>
                        <tbody>
                            <tr th:each="invoice : ${invoices}">
                                <td th:text="${invoice.invoiceNumber}">INV-0001</td>
                                <td th:text="${#temporals.format(invoice.createdAt, 'dd/MM/yyyy HH:mm')}">01/01/2026</td>
                                <td th:text="${invoice.totalAmount} + ' ' + #{business_days.view.currency}">150 ج.م</td>
                                <td>
                                    <span class="status-badge" th:classappend="${invoice.status == 'PAID' ? 'status-delivered' : 'status-waiting'}"
                                          th:text="${invoice.status == 'PAID'} ? #{invoices.status.paid} : #{invoices.status.unpaid}"></span>
                                </td>
                                <td>
                                    <div class="btn-group" style="display: flex; gap: 4px;">
                                        <a th:href="@{'/invoices/' + ${invoice.id} + '/download'}" class="btn btn-secondary btn-sm" th:title="#{invoices.list.btn_download}">
                                            <span th:text="#{invoices.list.btn_download}">📥 تحميل</span>
                                        </a>
                                        
                                        <form th:if="${invoice.status != 'PAID'}" th:action="@{'/invoices/' + ${invoice.id} + '/pay'}" method="post" style="margin: 0;">
                                            <button type="submit" class="btn btn-success btn-sm" th:title="#{invoices.list.btn_pay}"
                                                    onclick="return confirm('هل أنت متأكد من تأكيد الدفع لهذه الفاتورة؟')">
                                                <span th:text="#{invoices.list.btn_pay}">✅ دفع</span>
                                            </button>
                                        </form>
                                    </div>
                                </td>
                            </tr>
                            <tr th:if="${#lists.isEmpty(invoices)}">
                                <td colspan="5" style="text-align: center;" th:text="#{invoices.list.empty}">لا توجد فواتير حالياً.</td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </div>

        </main>
    </div>

    <button class="mobile-menu-toggle" onclick="toggleSidebar()">☰</button>
    <script th:src="@{/js/sidebar.js}"></script>
</body>

</html>
