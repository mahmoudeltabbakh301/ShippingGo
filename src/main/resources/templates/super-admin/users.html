<!DOCTYPE html>
<html th:lang="${#locale.language}" th:dir="${#locale.language == 'ar' ? 'rtl' : 'ltr'}"
    xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="#{super_admin.users.title} + ' - ' + #{app.title}">إدارة المستخدمين - ShippingGo</title>

    <script>
        (function () {
            var theme = localStorage.getItem('theme');
            if (theme === 'dark' || (!theme && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
                document.documentElement.setAttribute('data-theme', 'dark');
            }
        })();
    </script>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;500;600;700&display=swap" rel="stylesheet">

    <link rel="stylesheet" th:href="@{/css/main.css}">
    <link rel="stylesheet" th:href="@{/css/components/sidebar.css}">
    <link rel="stylesheet" th:href="@{/css/components/buttons.css}">
    <link rel="stylesheet" th:href="@{/css/components/forms.css}">
    <link rel="stylesheet" th:href="@{/css/components/tables.css}">
</head>

<body>

    <div class="app-layout">
        <th:block th:replace="~{fragments/sidebar :: sidebar}"></th:block>

        <main class="main-content">
            <!-- Alerts -->
            <div th:if="${success}" class="alert alert-success">
                <span>✓</span> <span th:text="${success}"></span>
            </div>
            <div th:if="${error}" class="alert alert-danger">
                <span>✕</span> <span th:text="${error}"></span>
            </div>

            <div class="page-header">
                <div>
                    <h1 class="page-title">👥 <span th:text="#{super_admin.users.title}">إدارة المستخدمين</span></h1>
                    <p class="page-subtitle" th:text="#{super_admin.users.subtitle}">عرض وإدارة جميع المستخدمين على المنصة</p>
                </div>
            </div>

            <!-- Search -->
            <div class="card" style="margin-bottom: var(--space-4);">
                <form th:action="@{/super-admin/users}" method="get" style="display: flex; gap: var(--space-3); align-items: center; flex-wrap: wrap;">
                    <input type="text" name="search" class="form-control" th:value="${search}"
                           th:placeholder="#{super_admin.users.search_placeholder}"
                           style="flex: 1; min-width: 200px;">
                    <button type="submit" class="btn btn-primary" th:text="#{network.search.btn}">بحث</button>
                    <a th:if="${search != null && !search.isEmpty()}" th:href="@{/super-admin/users}"
                       class="btn btn-outline" th:text="#{network.search.cancel}">إلغاء</a>
                </form>
            </div>

            <!-- Users Table -->
            <div class="card">
                <div th:if="${users.isEmpty()}" class="table-empty">
                    <div class="table-empty-icon">👥</div>
                    <div class="table-empty-text" th:text="#{super_admin.users.empty}">لا يوجد مستخدمين</div>
                </div>

                <div th:if="${!users.isEmpty()}" class="table-container" style="border: none;">
                    <table class="table table-striped">
                        <thead>
                            <tr>
                                <th>#</th>
                                <th th:text="#{super_admin.users.col_name}">الاسم</th>
                                <th th:text="#{super_admin.users.col_username}">اسم المستخدم</th>
                                <th th:text="#{super_admin.users.col_email}">البريد</th>
                                <th th:text="#{super_admin.users.col_phone}">الهاتف</th>
                                <th th:text="#{super_admin.users.col_role}">الصلاحية</th>
                                <th th:text="#{super_admin.users.col_status}">الحالة</th>
                                <th th:text="#{super_admin.users.col_created}">التسجيل</th>
                                <th th:text="#{super_admin.users.col_actions}">إجراءات</th>
                            </tr>
                        </thead>
                        <tbody>
                            <tr th:each="u, iter : ${users}">
                                <td th:text="${iter.index + 1}">1</td>
                                <td>
                                    <a th:href="@{/super-admin/users/{id}(id=${u.id})}"
                                       th:text="${u.fullName}" style="text-decoration: none; font-weight: 600;">اسم</a>
                                </td>
                                <td th:text="${u.username}">username</td>
                                <td th:text="${u.email}">email</td>
                                <td th:text="${u.phone}">phone</td>
                                <td>
                                    <span class="badge" th:text="${u.role}">ROLE</span>
                                </td>
                                <td>
                                    <span class="badge badge-delivered" th:if="${u.enabled}"
                                          th:text="#{super_admin.status.active}">مفعّل</span>
                                    <span class="badge badge-refused" th:unless="${u.enabled}"
                                          th:text="#{super_admin.status.inactive}">معطّل</span>
                                </td>
                                <td th:text="${#temporals.format(u.createdAt, 'yyyy/MM/dd')}">تاريخ</td>
                                <td>
                                    <div style="display: flex; gap: var(--space-2); flex-wrap: wrap;">
                                        <a th:href="@{/super-admin/users/{id}(id=${u.id})}"
                                           class="btn btn-sm btn-outline" th:text="#{super_admin.btn.details}">تفاصيل</a>
                                        <form th:if="${u.role.name() != 'SUPER_ADMIN'}"
                                              th:action="@{/super-admin/users/{id}/toggle(id=${u.id})}"
                                              method="post" style="display: inline;">
                                            <button type="submit" class="btn btn-sm"
                                                    th:classappend="${u.enabled ? 'btn-danger' : 'btn-success'}"
                                                    th:text="${u.enabled} ? #{super_admin.btn.deactivate} : #{super_admin.btn.activate}"
                                                    onclick="return confirm(this.textContent + '?');">تعطيل</button>
                                        </form>
                                    </div>
                                </td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </main>
    </div>

    <button class="mobile-menu-toggle" onclick="toggleSidebar()">☰</button>
    <script th:src="@{/js/sidebar.js}"></script>
    <script th:src="@{/js/preferences.js}"></script>
</body>
</html>
