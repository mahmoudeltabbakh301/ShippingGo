<!DOCTYPE html>
<html th:lang="${#locale.language}" th:dir="${#locale.language == 'ar' ? 'rtl' : 'ltr'}"
    xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="#{business_days.title} + ' - ' + #{app.title}">أيام العمل - ShippingGo</title>
    <!-- Early theme apply to prevent flash -->
    <script>
        (function () {
            var theme = localStorage.getItem('theme');
            if (theme === 'dark' || (!theme && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
                document.documentElement.setAttribute('data-theme', 'dark');
            }
        })();
    </script>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;500;600;700&display=swap" rel="stylesheet">

    <link rel="stylesheet" th:href="@{/css/main.css}">
    <link rel="stylesheet" th:href="@{/css/components/sidebar.css}">
    <link rel="stylesheet" th:href="@{/css/components/buttons.css}">
    <link rel="stylesheet" th:href="@{/css/components/tables.css}">
</head>

<body>


    <div class="app-layout">
        <th:block th:replace="~{fragments/sidebar :: sidebar}"></th:block>

        <main class="main-content">
            <!-- Alerts -->
            <div th:if="${success}" class="alert alert-success"><span>✓</span><span th:text="${success}"></span></div>
            <div th:if="${error}" class="alert alert-danger"><span>✕</span><span th:text="${error}"></span></div>

            <!-- Page Header -->
            <div class="page-header">
                <h1 class="page-title">📅 <span th:text="#{business_days.title}">أيام العمل</span></h1>
                <a th:href="@{/business-days/new}" class="btn btn-primary" sec:authorize="hasRole('ADMIN')"
                    th:text="#{business_days.btn_new_day}">➕ يوم عمل
                    جديد</a>
            </div>

            <!-- Business Days Table -->
            <div class="card">
                <div th:if="${businessDays.isEmpty()}" class="table-empty">
                    <div class="table-empty-icon">📅</div>
                    <div class="table-empty-text" th:text="#{business_days.empty}">لا توجد أيام عمل بعد</div>
                </div>


                <div th:if="${!businessDays.isEmpty()}" class="table-container" style="border: none;">
                    <table class="table table-striped">
                        <thead>
                            <tr>
                                <th th:text="#{business_days.col.name}">الاسم</th>
                                <th th:text="#{business_days.col.date}">التاريخ</th>
                                <th th:text="#{business_days.col.status}">الحالة</th>
                                <th th:text="#{business_days.col.created_by}">منشئ بواسطة</th>
                                <th th:text="#{business_days.col.created_at}">تاريخ الإنشاء</th>
                                <th th:text="#{business_days.col.actions}">إجراءات</th>
                            </tr>
                        </thead>
                        <tbody>
                            <tr th:each="bd : ${businessDays}">
                                <td th:text="${bd.name}">الاسم</td>
                                <td th:text="${#temporals.format(bd.date, 'yyyy/MM/dd')}">التاريخ</td>
                                <td>
                                    <span th:if="${bd.active}" class="badge badge-delivered"
                                        th:text="#{business_days.badge.active}">نشط</span>
                                    <span th:unless="${bd.active}" class="badge badge-refused"
                                        th:text="#{business_days.badge.inactive}">غير نشط</span>
                                </td>
                                <td th:text="${bd.createdBy != null ? bd.createdBy.fullName : '-'}">المنشئ</td>
                                <td th:text="${#temporals.format(bd.createdAt, 'yyyy/MM/dd HH:mm')}">تاريخ الإنشاء</td>
                                <td>
                                    <a th:href="@{/business-days/{id}(id=${bd.id})}" class="btn btn-sm btn-primary"
                                        th:text="#{business_days.btn.view}">👁
                                        عرض</a>
                                    <form th:action="@{/business-days/{id}/toggle(id=${bd.id})}" method="post"
                                        style="display: inline;" sec:authorize="hasRole('ADMIN')">
                                        <button type="submit" class="btn btn-sm"
                                            th:classappend="${bd.active} ? 'btn-warning' : 'btn-success'"
                                            th:text="${bd.active} ? #{business_days.btn.suspend} : #{business_days.btn.activate}">تبديل</button>
                                    </form>
                                    <button class="btn btn-sm btn-secondary" th:data-id="${bd.id}"
                                        th:data-name="${bd.name}"
                                        onclick="renameDay(this.getAttribute('data-id'), this.getAttribute('data-name'))"
                                        sec:authorize="hasRole('ADMIN')" th:text="#{business_days.btn.edit}">✏️
                                        تعديل</button>
                                </td>
                            </tr>
                        </tbody>
                    </table>
                </div>

                <!-- Pagination Controls -->
                <div th:if="${totalPages > 1}" class="pagination-container" style="display: flex; justify-content: center; align-items: center; gap: 8px; margin: 16px 0;">
                    <a th:if="${currentPage > 0}" th:href="@{/business-days(page=${currentPage - 1})}" class="btn btn-outline btn-sm" th:text="#{btn.prev}">السابق</a>
                    
                    <span th:each="pageNum : ${#numbers.sequence(0, totalPages - 1)}">
                        <a th:href="@{/business-days(page=${pageNum})}" 
                           class="btn btn-sm" 
                           th:classappend="${pageNum == currentPage} ? 'btn-primary' : 'btn-outline'"
                           th:text="${pageNum + 1}">1</a>
                    </span>

                    <a th:if="${currentPage < totalPages - 1}" th:href="@{/business-days(page=${currentPage + 1})}" class="btn btn-outline btn-sm" th:text="#{btn.next}">التالي</a>
                </div>
            </div>
        </main>
    </div>

    <form id="renameForm" th:action="@{/}" method="post" style="display: none;">
        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />
        <input type="hidden" name="name" id="renameInput">
    </form>

    <!-- Rename Modal -->
    <div id="renameModal" class="modal-backdrop"
        style="display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); z-index: 1000; align-items: center; justify-content: center;">
        <div class="modal-content"
            style="background: white; padding: var(--space-6); border-radius: var(--radius-lg); width: 90%; max-width: 400px; box-shadow: var(--shadow-lg);">
            <h3 style="margin-top: 0; margin-bottom: var(--space-4);" th:text="#{business_days.rename_prompt}">تعديل اسم
                يوم العمل</h3>
            <div class="form-group" style="margin-bottom: var(--space-4);">
                <input type="text" id="renameModalInput" class="form-control" style="width: 100%;">
            </div>
            <div style="display: flex; gap: var(--space-3); justify-content: flex-end;">
                <button type="button" class="btn btn-outline" onclick="closeRenameModal()"
                    th:text="#{btn.cancel}">إلغاء</button>
                <button type="button" class="btn btn-primary" onclick="submitRenameModal()"
                    th:text="#{btn.save}">حفظ</button>
            </div>
        </div>
    </div>

    <script th:inline="javascript">
        let currentRenameId = null;

        function renameDay(id, currentName) {
            currentRenameId = id;
            document.getElementById('renameModalInput').value = currentName;
            const modal = document.getElementById('renameModal');
            modal.style.display = 'flex';
            document.getElementById('renameModalInput').focus();
        }

        function closeRenameModal() {
            document.getElementById('renameModal').style.display = 'none';
            currentRenameId = null;
        }

        function submitRenameModal() {
            const newName = document.getElementById('renameModalInput').value.trim();
            if (newName && currentRenameId) {
                const form = document.getElementById('renameForm');
                var baseUrl = /*[[@{/business-days/}]]*/ '/business-days/';
                form.action = baseUrl + currentRenameId + '/update-name';
                document.getElementById('renameInput').value = newName;
                form.submit();
            }
        }

        // Close modal when clicking outside
        window.onclick = function (event) {
            const modal = document.getElementById('renameModal');
            if (event.target == modal) {
                closeRenameModal();
            }
        }
    </script>

    <button class="mobile-menu-toggle" onclick="toggleSidebar()">☰</button>
    <script th:src="@{/js/sidebar.js}"></script>
</body>

</html>
