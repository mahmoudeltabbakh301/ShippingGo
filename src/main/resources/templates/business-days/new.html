<!DOCTYPE html>
<html th:lang="${#locale.language}" th:dir="${#locale.language == 'ar' ? 'rtl' : 'ltr'}"
    xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="#{business_days.new.title} + ' - ' + #{app.title}">يوم عمل جديد - ShippingGo</title>
    <!-- Early theme apply to prevent flash -->
    <script>
        (function () {
            var theme = localStorage.getItem('theme');
            if (theme === 'dark' || (!theme && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
                document.documentElement.setAttribute('data-theme', 'dark');
            }
        })();
    </script>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;500;600;700&display=swap" rel="stylesheet">

    <link rel="stylesheet" th:href="@{/css/main.css}">
    <link rel="stylesheet" th:href="@{/css/components/sidebar.css}">
    <link rel="stylesheet" th:href="@{/css/components/buttons.css}">
    <link rel="stylesheet" th:href="@{/css/components/forms.css}">
</head>

<body>
    <div class="app-layout">
        <th:block th:replace="~{fragments/sidebar :: sidebar}"></th:block>

        <main class="main-content">
            <!-- Breadcrumb -->
            <div class="breadcrumb">
                <a th:href="@{/business-days}" th:text="#{business_days.new.breadcrumb_list}">أيام العمل</a>
                <span class="breadcrumb-separator">/</span>
                <span th:text="#{business_days.new.breadcrumb_new}">يوم عمل جديد</span>
            </div>

            <!-- Page Header -->
            <div class="page-header">
                <h1 class="page-title"><span th:text="#{business_days.new.h1_title}">➕ إنشاء يوم عمل جديد</span></h1>
            </div>

            <div class="card" style="max-width: 500px;">
                <form th:action="@{/business-days/new}" method="post">
                    <div class="form-group">
                        <label class="form-label form-label-required" for="date"
                            th:text="#{business_days.new.label_date}">التاريخ</label>
                        <input type="date" id="date" name="date" class="form-control" th:value="${today}" required>
                    </div>

                    <div class="form-group">
                        <label class="form-label" for="name" th:text="#{business_days.new.label_name}">اسم اليوم
                            (اختياري)</label>
                        <input type="text" id="name" name="name" class="form-control"
                            th:placeholder="#{business_days.new.placeholder_name}">
                    </div>

                    <div class="form-actions">
                        <button type="submit" class="btn btn-primary btn-lg"
                            th:text="#{business_days.new.btn_submit}">إنشاء يوم العمل</button>
                        <a th:href="@{/business-days}" class="btn btn-secondary btn-lg"
                            th:text="#{business_days.new.btn_cancel}">إلغاء</a>
                    </div>
                </form>
            </div>
        </main>
    </div>

    <button class="mobile-menu-toggle" onclick="document.querySelector('.sidebar').classList.toggle('open')">☰</button>
</body>

</html>
