<!DOCTYPE html>
<html th:lang="${#locale.language}" th:dir="${#locale.language == 'ar' ? 'rtl' : 'ltr'}"
    xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="#{members.list.page_title} + ' - ' + #{app.title}">الأعضاء - ShippingGo</title>
    <!-- Early theme apply to prevent flash -->
    <script>
        (function () {
            var theme = localStorage.getItem('theme');
            if (theme === 'dark' || (!theme && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
                document.documentElement.setAttribute('data-theme', 'dark');
            }
        })();
    </script>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;500;600;700&display=swap" rel="stylesheet">

    <link rel="stylesheet" th:href="@{/css/main.css}">
    <link rel="stylesheet" th:href="@{/css/components/sidebar.css}">
    <link rel="stylesheet" th:href="@{/css/components/buttons.css}">
    <link rel="stylesheet" th:href="@{/css/components/tables.css}">
    <link rel="stylesheet" th:href="@{/css/components/forms.css}">
</head>

<body>
    <div class="app-layout">
        <th:block th:replace="~{fragments/sidebar :: sidebar}"></th:block>

        <main class="main-content">
            <!-- Alerts -->
            <div th:if="${success}" class="alert alert-success"><span>✓</span><span th:text="${success}"></span></div>
            <div th:if="${error}" class="alert alert-danger"><span>✕</span><span th:text="${error}"></span></div>

            <!-- Page Header -->
            <div class="page-header">
                <h1 class="page-title">👥 <span th:text="#{members.list.title}">إدارة الأعضاء</span></h1>
            </div>

            <!-- Invite Member Card -->
            <div class="card" style="margin-bottom: var(--space-6);">
                <div class="card-header">
                    <h3 class="card-title">📩 <span th:text="#{members.list.invite_title}">إرسال دعوة عضو
                            جديد</span></h3>
                </div>
                <div class="card-body" style="padding: var(--space-4);">
                    <form th:action="@{/members/invite}" method="post"
                        style="display: flex; gap: var(--space-3); align-items: flex-end; flex-wrap: wrap;">
                        <div class="form-group" style="flex: 1; min-width: 200px; margin-bottom: 0;">
                            <label class="form-label" th:text="#{members.list.invite_identifier_label}">البريد
                                الإلكتروني أو اسم
                                المستخدم</label>
                            <input type="text" name="identifier" class="form-control" required autocomplete="off"
                                th:placeholder="#{members.list.invite_identifier_placeholder}">
                        </div>
                        <div class="form-group" style="min-width: 150px; margin-bottom: 0;">
                            <label class="form-label" th:text="#{members.list.invite_role_label}">الوظيفة</label>
                            <select name="role" class="form-control" required>
                                <option value="COURIER" th:text="#{role.COURIER}">مندوب توصيل</option>
                                <option value="DATA_ENTRY" th:text="#{role.DATA_ENTRY}">موظف إدخال بيانات</option>
                                <option value="ACCOUNTANT" th:text="#{role.ACCOUNTANT}">محاسب</option>
                                <option value="FOLLOW_UP" th:text="#{role.FOLLOW_UP}">متابعة</option>
                                <option value="MANAGER" th:text="#{role.MANAGER}">مدير</option>
                                <option value="WAREHOUSE_MANAGER" th:text="#{role.WAREHOUSE_MANAGER}">مدير مخزن
                                </option>
                            </select>
                        </div>
                        <button type="submit" class="btn btn-primary" th:text="#{members.list.btn_invite}">📩 إرسال
                            الدعوة</button>
                    </form>
                </div>
            </div>

            <!-- Pending Invitations -->
            <div class="card" th:if="${!pendingMemberships.isEmpty()}" style="margin-bottom: var(--space-6);">
                <div class="card-header">
                    <h3 class="card-title">⏳ <span th:text="#{members.list.pending_invites_title}">دعوات بانتظار
                            الرد</span></h3>
                </div>
                <div class="table-container" style="border: none;">
                    <table class="table">
                        <thead>
                            <tr>
                                <th th:text="#{members.list.col_name}">الاسم</th>
                                <th th:text="#{members.list.col_email}">البريد الإلكتروني</th>
                                <th th:text="#{members.list.col_phone}">الهاتف</th>
                                <th th:text="#{members.list.invite_role_label}">الوظيفة</th>
                                <th th:text="#{members.list.col_invite_date}">تاريخ الدعوة</th>
                                <th th:text="#{invitations.col_actions}">إجراءات</th>
                            </tr>
                        </thead>
                        <tbody>
                            <tr th:each="m : ${pendingMemberships}">
                                <td th:text="${m.user.fullName}">الاسم</td>
                                <td th:text="${m.user.email}">البريد</td>
                                <td th:text="${m.user.phone} ?: '-'">الهاتف</td>
                                <td>
                                    <span class="badge badge-transit"
                                        th:text="#{ 'role.' + ${m.assignedRole.name()} }">الوظيفة</span>
                                </td>
                                <td th:text="${#temporals.format(m.invitedAt, 'yyyy/MM/dd HH:mm')}">التاريخ</td>
                                <td>
                                    <form th:action="@{/members/{id}/cancel-invite(id=${m.id})}" method="post"
                                        style="display: inline;">
                                        <button type="submit" class="btn btn-sm btn-danger"
                                            th:text="#{members.list.btn_cancel_invite}">❌ إلغاء الدعوة</button>
                                    </form>
                                </td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </div>

            <!-- Accepted Members Table -->
            <div class="card">
                <div class="card-header">
                    <h3 class="card-title">👥 <span th:text="#{members.list.accepted_title}">الأعضاء الحاليون</span>
                    </h3>
                    <span class="badge badge-delivered" th:text="${#lists.size(acceptedMemberships)}">0</span>
                </div>
                <div th:if="${acceptedMemberships.isEmpty()}"
                    style="text-align: center; padding: var(--space-6); color: var(--text-secondary);"
                    th:text="#{members.list.empty_accepted}">
                    لا يوجد أعضاء مسجلين
                </div>
                <div th:if="${!acceptedMemberships.isEmpty()}" class="table-container" style="border: none;">
                    <table class="table">
                        <thead>
                            <tr>
                                <th th:text="#{members.list.col_name}">الاسم</th>
                                <th th:text="#{members.list.col_current_role}">الوظيفة الحالية</th>
                                <th th:text="#{members.list.col_change_role}">تغيير الوظيفة</th>
                                <th th:text="#{members.list.col_join_date}">تاريخ الانضمام</th>
                            </tr>
                        </thead>
                        <tbody>
                            <tr th:each="m : ${acceptedMemberships}">
                                <td>
                                    <div style="display: flex; align-items: center; gap: var(--space-3);">
                                        <div
                                            style="width: 32px; height: 32px; background: var(--dark-border); border-radius: var(--radius-full); display: flex; align-items: center; justify-content: center; font-size: 0.875rem; font-weight: 600; overflow: hidden;">
                                            <img th:if="${m.user.profilePicture}"
                                                th:src="@{'/uploads/' + ${m.user.profilePicture}}" alt="Profile"
                                                style="width: 100%; height: 100%; object-fit: cover;">
                                            <span th:unless="${m.user.profilePicture}"
                                                th:text="${m.user.fullName != null && !m.user.fullName.isEmpty() ? #strings.substring(m.user.fullName, 0, 1) : '?'}"></span>
                                        </div>
                                        <div>
                                            <div style="font-weight: 600;" th:text="${m.user.fullName}"></div>
                                            <div style="font-size: 0.75rem; color: var(--text-secondary);"
                                                th:text="${m.user.email}"></div>
                                        </div>
                                    </div>
                                </td>
                                <td>
                                    <span class="badge"
                                        th:classappend="${m.assignedRole.name() == 'DATA_ENTRY' ? 'badge-pending' : 'badge-transit'}"
                                        th:text="#{ 'role.' + ${m.assignedRole.name()} }">الوظيفة</span>
                                </td>
                                <td>
                                    <div style="display: flex; gap: var(--space-2); align-items: center;">
                                        <form th:action="@{/members/{id}/update-role(id=${m.id})}" method="post"
                                            style="display: flex; gap: var(--space-2);">
                                            <select name="role" class="form-control form-control-sm"
                                                style="width: auto;">
                                                <option value="COURIER"
                                                    th:selected="${m.assignedRole.name() == 'COURIER'}"
                                                    th:text="#{role.COURIER}">مندوب توصيل</option>
                                                <option value="DATA_ENTRY"
                                                    th:selected="${m.assignedRole.name() == 'DATA_ENTRY'}"
                                                    th:text="#{role.DATA_ENTRY}">موظف إدخال بيانات</option>
                                                <option value="ACCOUNTANT"
                                                    th:selected="${m.assignedRole.name() == 'ACCOUNTANT'}"
                                                    th:text="#{role.ACCOUNTANT}">محاسب</option>
                                                <option value="FOLLOW_UP"
                                                    th:selected="${m.assignedRole.name() == 'FOLLOW_UP'}"
                                                    th:text="#{role.FOLLOW_UP}">متابعة</option>
                                                <option value="MANAGER"
                                                    th:selected="${m.assignedRole.name() == 'MANAGER'}"
                                                    th:text="#{role.MANAGER}">مدير</option>
                                                <option value="WAREHOUSE_MANAGER"
                                                    th:selected="${m.assignedRole.name() == 'WAREHOUSE_MANAGER'}"
                                                    th:text="#{role.WAREHOUSE_MANAGER}">مدير مخزن</option>
                                            </select>
                                            <button type="submit" class="btn btn-sm btn-secondary"
                                                th:text="#{members.list.btn_update}">تحديث</button>
                                        </form>
                                        <form th:action="@{/members/{id}/remove(id=${m.id})}" method="post"
                                            style="display: inline;"
                                            th:onsubmit="|return confirm('#{members.list.confirm_delete}');|">
                                            <button type="submit" class="btn btn-sm btn-danger"
                                                th:title="#{members.list.delete_member}">❌</button>
                                        </form>
                                    </div>
                                </td>
                                <td th:text="${#temporals.format(m.processedAt, 'yyyy/MM/dd')}"></td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </main>
    </div>

    <button class="mobile-menu-toggle" onclick="toggleSidebar()">☰</button>
    <script th:src="@{/js/sidebar.js}"></script>
</body>

</html>
