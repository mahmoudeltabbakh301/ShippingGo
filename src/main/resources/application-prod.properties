# Production Environment Profile
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:mysql://prod-db:3306/shippinggo_db?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD}

spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false

jwt.secret=${JWT_SECRET}
jwt.expiration=86400000

spring.thymeleaf.cache=true

# Logging Configuration
logging.level.root=INFO
logging.level.com.shipment.shippinggo=INFO
logging.level.org.springframework.web=INFO
logging.file.name=logs/shippinggo-prod.log

# Server Configuration for Reverse Proxy (Nginx)
server.forward-headers-strategy=native
server.error.include-message=never
server.error.include-stacktrace=never
