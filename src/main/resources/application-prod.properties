# Production Environment Profile

spring.datasource.url=jdbc:mysql://${MYSQL_ADDON_HOST:localhost}:${MYSQL_ADDON_PORT:3306}/${MYSQL_ADDON_DB:shippinggo_db}?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
spring.datasource.username=${MYSQL_ADDON_USER:root}
spring.datasource.password=${MYSQL_ADDON_PASSWORD:}

# Server Configuration for Render
server.port=${PORT:8080}
server.address=0.0.0.0

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false

jwt.secret=${JWT_SECRET}
jwt.expiration=86400000

spring.thymeleaf.cache=true

# Logging Configuration
logging.level.root=INFO
logging.level.com.shipment.shippinggo=INFO
logging.level.org.springframework.web=INFO
logging.file.name=logs/shippinggo-prod.log

# Server Configuration for Reverse Proxy (Nginx)
server.forward-headers-strategy=native
server.error.include-message=never
server.error.include-stacktrace=never
