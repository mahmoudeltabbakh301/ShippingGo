# Production Environment Profile

spring.datasource.url=jdbc:mysql://${MYSQL_ADDON_HOST}:${MYSQL_ADDON_PORT}/${MYSQL_ADDON_DB}?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
spring.datasource.username=${MYSQL_ADDON_USER}
spring.datasource.password=${MYSQL_ADDON_PASSWORD}

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false

jwt.secret=${JWT_SECRET}
jwt.expiration=86400000

spring.thymeleaf.cache=true

# Logging Configuration
logging.level.root=INFO
logging.level.com.shipment.shippinggo=INFO
logging.level.org.springframework.web=INFO
logging.file.name=logs/shippinggo-prod.log

# Server Configuration for Reverse Proxy (Nginx)
server.forward-headers-strategy=native
server.error.include-message=never
server.error.include-stacktrace=never
