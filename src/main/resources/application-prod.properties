# Production Environment Profile
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:mysql://${MYSQL_ADDON_HOST:prod-db}:${MYSQL_ADDON_PORT:3306}/${MYSQL_ADDON_DB:shippinggo_db}?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:${MYSQL_ADDON_USER}}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:${MYSQL_ADDON_PASSWORD}}

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false

jwt.secret=${JWT_SECRET}
jwt.expiration=86400000

spring.thymeleaf.cache=true

# Logging Configuration
logging.level.root=INFO
logging.level.com.shipment.shippinggo=INFO
logging.level.org.springframework.web=INFO
logging.file.name=logs/shippinggo-prod.log

# Server Configuration for Reverse Proxy (Nginx)
server.forward-headers-strategy=native
server.error.include-message=never
server.error.include-stacktrace=never
