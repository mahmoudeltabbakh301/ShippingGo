# ===================================
# ShippingGo Application Configuration
# ===================================
server.forward-headers-strategy=framework

# Determine active profile (default to dev)
spring.profiles.active=${SPRING_PROFILES_ACTIVE:dev}

# Common Configuration
spring.application.name=shippinggo
server.address=0.0.0.0
server.port=8080

# Default Fallback Database Config (Overridden by profiles)
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:mysql://localhost:3306/shippinggo_db?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:root}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:asd123}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA/Hibernate Configuration
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.open-in-view=true

# Thymeleaf Configuration
spring.thymeleaf.prefix=classpath:/templates/
spring.thymeleaf.suffix=.html

# i18n Messages Configuration
spring.messages.basename=messages
spring.messages.encoding=UTF-8
spring.messages.fallback-to-system-locale=false

# File Upload Configuration
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

# Default JWT Fallback Config
jwt.secret=${JWT_SECRET:9a4f2c8d3b7a1e6f45c8a0b3f267d8b1d4e6f3c8a9d2b5f8e3a9c8b5f6a8a3d9}
jwt.expiration=86400000

# Jackson Configuration
spring.jackson.serialization.fail-on-empty-beans=false

# Caching Configuration
spring.cache.type=caffeine
spring.cache.caffeine.spec=expireAfterWrite=60s

# Firebase Configuration
firebase.config.path=classpath:serviceAccountKey.json

# Email Configuration (Gmail SMTP)
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=midoeltabbakh322@gmail.com
spring.mail.password=cwwfmcduqhyasyrp
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
