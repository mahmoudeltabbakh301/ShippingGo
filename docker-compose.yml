# ====================================
# ShippingGo - Docker Compose (Fixed for Network)
# ====================================
# Usage:
#   Development:  docker-compose up -d
#   Production:   docker-compose --env-file .env.prod up -d
#   Stop:         docker-compose down
#   Rebuild:      docker-compose up -d --build
# ====================================

services:
  shippinggo-nginx:
    image: nginx:alpine
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf
      - ./nginx/ssl:/etc/nginx/ssl
    depends_on:
      - shippinggo-app

  # ---- Spring Boot Application ----
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: shippinggo-app
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "8080:8080"
    environment:
      SPRING_PROFILES_ACTIVE: prod
      SPRING_DATASOURCE_URL: jdbc:mysql://db:3306/shippinggo_db?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
      SPRING_DATASOURCE_USERNAME: ${MYSQL_USER:-shippinggo_user}
      SPRING_DATASOURCE_PASSWORD: ${MYSQL_PASSWORD:-shippinggo_pass}
      JWT_SECRET: ${JWT_SECRET:-9a4f2c8d3b7a1e6f45c8a0b3f267d8b1d4e6f3c8a9d2b5f8e3a9c8b5f6a8a3d9}
    volumes:
      - uploads_data:/app/uploads
      - app_logs:/app/logs
    networks:
      - shippinggo-network

  # ---- Nginx Reverse Proxy ----
  nginx:
    image: nginx:alpine
    container_name: shippinggo-nginx
    restart: unless-stopped
    depends_on:
      - app
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/ssl:/etc/nginx/ssl:ro
    networks:
      - shippinggo-network

volumes:
  mysql_data:
    driver: local
  uploads_data:
    driver: local
  app_logs:
    driver: local

networks:
  shippinggo-network:
    driver: bridge
