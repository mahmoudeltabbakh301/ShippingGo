# ====================================
# ShippingGo - Docker Compose
# ====================================
# Usage:
#   Development:  docker-compose up -d
#   Production:   docker-compose --env-file .env.prod up -d
#   Stop:         docker-compose down
#   Rebuild:      docker-compose up -d --build
#   Logs:         docker-compose logs -f
# ====================================

services:

  # ---- MySQL Database ----
  db:
    image: mysql:8.0
    container_name: shippinggo-db
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: shippinggo_db
      MYSQL_USER: ${MYSQL_USER:-shippinggo_user}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-shippinggo_pass}
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-root_pass}
    volumes:
      - mysql_data:/var/lib/mysql
    networks:
      - shippinggo-network
    healthcheck:
      test: [ "CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p${MYSQL_ROOT_PASSWORD:-root_pass}" ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  # ---- Spring Boot Application ----
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: shippinggo-app
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "8080:8080"
    environment:
      SPRING_PROFILES_ACTIVE: prod
      SPRING_DATASOURCE_URL: jdbc:mysql://db:3306/shippinggo_db?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
      SPRING_DATASOURCE_USERNAME: ${MYSQL_USER:-shippinggo_user}
      SPRING_DATASOURCE_PASSWORD: ${MYSQL_PASSWORD:-shippinggo_pass}
      JWT_SECRET: ${JWT_SECRET:-9a4f2c8d3b7a1e6f45c8a0b3f267d8b1d4e6f3c8a9d2b5f8e3a9c8b5f6a8a3d9}
      ALLOWED_ORIGINS: ${ALLOWED_ORIGINS:-https://shipping-go.com,https://www.shipping-go.com}
    volumes:
      - uploads_data:/app/uploads
      - app_logs:/app/logs
    networks:
      - shippinggo-network
    healthcheck:
      test: [ "CMD-SHELL", "wget -qO- http://localhost:8080/actuator/health || exit 1" ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

  # ---- Nginx Reverse Proxy ----
  nginx:
    image: nginx:alpine
    container_name: shippinggo-nginx
    restart: unless-stopped
    depends_on:
      app:
        condition: service_healthy
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/ssl:/etc/nginx/ssl:ro
    networks:
      - shippinggo-network

# ---- Volumes ----
volumes:
  mysql_data:
    driver: local
  uploads_data:
    driver: local
  app_logs:
    driver: local

# ---- Networks ----
networks:
  shippinggo-network:
    driver: bridge
